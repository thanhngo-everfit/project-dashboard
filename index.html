<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Roadmap Planning Dashboard</title>
<style>
  :root{
    --bg:#ffffff; --panel:#ffffff; --border:#e8eaef; --text:#101828;
    --muted:#8a93a3; --left-w:328px; --row-h:46px; --head-h:48px;
    --tab-h:40px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text);background:var(--bg);}
  body{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

  /* ---------- Top bar ---------- */
  .topbar{display:flex;align-items:center;gap:16px;padding:16px 24px 10px;background:#fff;}
  .topbar h1{font-size:30px;margin:0;font-weight:900;letter-spacing:-.5px;color:#101828;}
  .topbar h1 span{color:#c4cad4;font-weight:900;}
  .topbar .spacer{flex:1;}
  .ctrl-group{display:flex;align-items:center;gap:4px;background:#f0f1f4;border-radius:9px;padding:3px;}
  .ctrl-group button{background:transparent;border:none;color:#667085;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:700;}
  .ctrl-group button.active{background:#101828;color:#fff;}
  .ctrl-group button:hover:not(.active){color:#101828;}
  .topbar .iconbtn{background:#f0f1f4;border:none;color:#667085;width:36px;height:36px;border-radius:9px;cursor:pointer;font-size:16px;}
  .topbar .iconbtn:hover{color:#101828;background:#e6e8ec;}

  /* ---------- Tabs (Chrome-like) ---------- */
  .tabbar{display:flex;align-items:flex-end;gap:2px;background:#dfe3ea;padding:6px 10px 0;overflow-x:auto;}
  .tab{display:flex;align-items:center;gap:8px;background:#eceff3;border:1px solid var(--border);border-bottom:none;
       border-radius:10px 10px 0 0;padding:9px 12px 9px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);
       white-space:nowrap;position:relative;top:1px;max-width:240px;}
  .tab:hover{background:#f5f7fa;}
  .tab.active{background:var(--panel);color:var(--text);box-shadow:0 -2px 6px rgba(0,0,0,.04);}
  .tab.tab-dragging{opacity:.4;}
  .tab.tab-before{box-shadow:inset 3px 0 0 0 #4c6fff;}
  .tab.tab-after{box-shadow:inset -3px 0 0 0 #4c6fff;}
  .tab .tname{outline:none;}
  .tab .x{border:none;background:transparent;color:#98a2b3;cursor:pointer;border-radius:50%;width:20px;height:20px;font-size:14px;line-height:1;}
  .tab .x:hover{background:#e4e7ec;color:#d92d20;}
  .tab-add{border:none;background:transparent;color:var(--muted);font-size:22px;line-height:1;cursor:pointer;padding:4px 12px;border-radius:8px;align-self:center;}
  .tab-add:hover{background:#f5f7fa;color:var(--text);}

  /* ---------- Toolbar under tabs ---------- */
  .subbar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--panel);border-bottom:1px solid var(--border);}
  .subbar .squad-name{font-weight:800;font-size:15px;cursor:text;padding:3px 7px;border-radius:7px;outline:none;}
  .subbar .squad-name:hover{background:#f0f1f4;}
  .subbar .squad-name[contenteditable="true"]{background:#fff;box-shadow:0 0 0 2px #4c6fff;}
  .subbar .spacer{flex:1;}
  .btn{border:1px solid var(--border);background:#fff;color:var(--text);padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;}
  .btn:hover{background:#f5f7fa;}
  .btn.primary{background:#4c6fff;border-color:#4c6fff;color:#fff;}
  .btn.primary:hover{background:#3a5cf0;}
  .zoom{display:flex;align-items:center;gap:4px;}
  .zoom button{width:28px;height:28px;border:1px solid var(--border);background:#fff;border-radius:6px;cursor:pointer;font-size:15px;}
  .zoom button:hover{background:#f5f7fa;}

  /* ---------- Gantt area ---------- */
  .gantt{flex:1;overflow:auto;position:relative;background:var(--panel);}
  .grid{position:relative;min-width:max-content;}
  .row{display:flex;height:var(--row-h);border-bottom:1px solid #f0f1f4;position:relative;}
  .row.project{background:#fafbfc;}
  .row.project .left{font-weight:800;}
  .row.phase .left{font-weight:600;}
  .row.task{height:32px;}
  .row.task .left{font-weight:500;color:#475467;}
  .row.task .left .label{font-size:12px;}
  .row.task .bar{top:7px;height:18px;font-size:10.5px;border-radius:6px;}
  .row.task .bar .fill{border-radius:6px 0 0 6px;}
  /* dashed connector thread (project -> its dev work), Facebook-comment style */
  .tree{position:absolute;left:34px;top:0;bottom:0;width:48px;pointer-events:none;z-index:1;}
  .tree .v{position:absolute;left:0;top:0;bottom:0;border-left:2px dashed #ccd2dc;}
  .tree.last .v{bottom:50%;}
  .tree .h{position:absolute;left:0;width:46px;top:calc(50% - 1px);border-top:2px dashed #ccd2dc;border-bottom-left-radius:8px;}
  /* timeline connector thread (in the track), rooted at the project's start column */
  .tl-v{position:absolute;top:0;bottom:0;width:0;border-left:2px dashed #c4cad4;z-index:1;pointer-events:none;}
  .tl-v.last{bottom:calc(50% - 1px);}
  .tl-h{position:absolute;top:calc(50% - 1px);height:0;border-top:2px dashed #c4cad4;z-index:1;pointer-events:none;}
  /* phase row drag-and-drop (move between projects / reorder) */
  .row.phase .left.drag-src{cursor:grab;}
  .row.phase .left.drag-src:active{cursor:grabbing;}
  .row.row-dragging{opacity:.4;}
  .row.drop-into .left{box-shadow:inset 0 0 0 2px #4c6fff;border-radius:6px;}
  .row.drop-before .left{box-shadow:inset 0 3px 0 0 #4c6fff;}
  /* category reorder */
  .row.project .left.drag-src{cursor:grab;}
  .row.project .left.drag-src:active{cursor:grabbing;}
  .row.cat-dragging{opacity:.4;}
  .row.cat-before{box-shadow:inset 0 3px 0 0 #4c6fff;}
  .row.cat-after{box-shadow:inset 0 -3px 0 0 #4c6fff;}

  .left{position:sticky;left:0;z-index:5;width:var(--left-w);min-width:var(--left-w);
        display:flex;align-items:center;gap:8px;padding:0 16px;background:inherit;border-right:1px solid var(--border);}
  .row.project .left{padding-left:18px;}
  .row.project .left{background:#fafbfc;}
  .row.phase .left,.row.task .left{background:#fff;}
  .left .caret{width:16px;text-align:center;cursor:pointer;color:#98a2b3;font-size:11px;user-select:none;flex:none;}
  .left .caret.hidden{visibility:hidden;}
  .left .dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .left .label{flex:1;font-size:13px;line-height:1.2;overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;line-clamp:2;word-break:break-word;}
  .tagchip{flex:none;font-size:10px;font-weight:700;color:#5b21b6;background:#ede9fe;border:1px solid #ddd6fe;border-radius:999px;padding:1px 7px;white-space:nowrap;}
  .tagfilter{border:1px solid var(--border);background:#fff;border-radius:8px;padding:6px 8px;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;}
  .left .acts{display:none;gap:2px;flex:none;}
  .left:hover .acts{display:flex;}
  .left .acts button{border:none;background:transparent;cursor:pointer;font-size:12px;color:#98a2b3;width:22px;height:22px;border-radius:5px;}
  .left .acts button:hover{background:#eef0f3;color:var(--text);}
  .indent{flex:none;}

  .track{position:relative;flex:1;min-width:0;}
  /* column separators painted via background of header cells; track gridlines: */
  .gridlines{position:absolute;inset:0;z-index:0;pointer-events:none;}
  .gridlines .col{position:absolute;top:0;bottom:0;border-left:1px solid #eef0f3;}
  .gridlines .subcol{position:absolute;top:0;bottom:0;border-left:1px solid #f5f6f8;}

  /* header */
  .head{position:sticky;top:0;z-index:8;display:flex;height:var(--head-h);background:var(--panel);}
  .head .left{z-index:9;font-weight:800;font-size:12px;color:var(--muted);background:var(--panel);letter-spacing:.4px;text-transform:uppercase;}
  .hdr-add{margin-left:auto;flex:none;width:24px;height:24px;border:1px solid var(--border);background:#fff;color:#4c6fff;border-radius:7px;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;}
  .hdr-add:hover{background:#4c6fff;color:#fff;border-color:#4c6fff;}
  .head .track{display:flex;}
  .headcell{position:absolute;top:0;height:var(--head-h);
            display:flex;align-items:center;gap:5px;padding-left:14px;font-size:15px;font-weight:800;color:#fff;letter-spacing:.3px;}
  .headcell small{font-weight:600;opacity:.7;font-size:12px;}
  /* week view two-tier header */
  .head.week{height:58px;}
  .monthband{position:absolute;top:0;height:26px;display:flex;align-items:center;padding-left:10px;font-size:13px;font-weight:800;color:#fff;letter-spacing:.3px;border-right:1px solid rgba(255,255,255,.15);}
  .daycell{position:absolute;top:26px;height:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;border-left:1px solid #eef0f3;font-size:11px;color:#475467;}
  .daycell .dnum{font-weight:700;line-height:1.1;}
  .daycell .ddow{font-size:9px;color:#98a2b3;line-height:1.1;}
  .daycell.weekend{background:#f4f5f7;}
  .daycell.istoday{background:#fee4e2;}
  .daycell.istoday .dnum{color:#d92d20;}
  /* month view three-tier header */
  .head.month{height:74px;}
  .m-year{position:absolute;top:0;height:22px;display:flex;align-items:center;padding-left:12px;font-size:12px;font-weight:800;color:#344054;background:#f0f1f4;border-right:1px solid #fff;letter-spacing:.3px;}
  .m-month{position:absolute;top:22px;height:28px;display:flex;align-items:center;padding-left:12px;font-size:14px;font-weight:800;color:#fff;letter-spacing:.3px;border-right:1px solid rgba(255,255,255,.15);}
  .m-week{position:absolute;top:50px;height:24px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#98a2b3;border-left:1px solid #eef0f3;}

  /* bars */
  .bar{position:absolute;top:6px;height:calc(var(--row-h) - 12px);border-radius:9px;cursor:grab;
       display:flex;align-items:center;justify-content:flex-start;gap:6px;padding:0 10px;font-size:10.5px;font-weight:600;overflow:hidden;
       user-select:none;}
  .bar.dragging{cursor:grabbing;opacity:.9;z-index:20;box-shadow:0 6px 16px rgba(16,24,40,.22);}
  .bar.wip{background:transparent!important;border:1.5px dashed currentColor;font-weight:700;}
  .bar.wip .fill{display:none;}
  .bar .barlabel{position:relative;z-index:2;overflow:hidden;text-align:left;line-height:1.25;
       display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;line-clamp:2;word-break:break-word;}
  .row.task .bar .barlabel{-webkit-line-clamp:1;line-clamp:1;white-space:nowrap;text-overflow:ellipsis;}
  .bar .fill{position:absolute;left:0;top:0;bottom:0;border-radius:9px 0 0 9px;z-index:1;}
  .bar .badge{position:relative;z-index:2;background:#101828;color:#fff;font-size:9.5px;font-weight:800;
       padding:2px 6px;border-radius:5px;letter-spacing:.3px;flex:none;}
  .bar .handle{position:absolute;top:0;bottom:0;width:8px;cursor:ew-resize;z-index:3;}
  .bar .handle.l{left:0;}
  .bar .handle.r{right:0;}
  .bar.summary{cursor:default;opacity:.5;height:5px;top:calc(50% - 2.5px);box-shadow:none;border-radius:3px;}

  .today{position:absolute;top:0;bottom:0;width:0;border-left:2px dashed #f04438;z-index:7;pointer-events:none;transform:translateX(-1px);}
  /* Today marker (dot + label) pinned at the top of the timeline */
  .today-mark{position:absolute;bottom:-1px;transform:translateX(-6px);display:flex;align-items:center;gap:5px;z-index:11;pointer-events:none;}
  .today-mark .dot{width:9px;height:9px;border-radius:50%;background:#f04438;box-shadow:0 0 0 2px #fff;}
  .today-mark .lbl{font-size:11px;font-weight:800;color:#f04438;white-space:nowrap;background:#fff;padding:1px 5px;border-radius:5px;box-shadow:0 1px 3px rgba(16,24,40,.15);}

  .empty{padding:40px;text-align:center;color:var(--muted);}

  /* ---------- Modal ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(16,24,40,.45);display:none;align-items:center;justify-content:center;z-index:100;}
  .modal-bg.open{display:flex;}
  .modal-wrap{position:relative;display:flex;align-items:flex-start;}
  .modal{background:#fff;border-radius:14px;width:460px;max-width:92vw;padding:22px;box-shadow:0 20px 50px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto;position:relative;}
  /* Note dock: a column to the right of the modal (button + side popup) */
  .note-dock{margin-left:14px;display:flex;flex-direction:column;align-items:flex-start;gap:12px;}
  .note-fab{position:relative;width:44px;height:44px;border-radius:50%;border:none;background:#fff;color:#667085;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(16,24,40,.18);transition:all .12s;}
  .note-fab:hover{color:#101828;}
  .note-fab.open{background:#4c6fff;color:#fff;}
  .note-fab.has::after{content:'';position:absolute;top:-1px;right:-1px;width:11px;height:11px;border-radius:50%;background:#12b3a6;border:2px solid #fff;}
  .note-panel{width:300px;max-width:34vw;background:#fff;border-radius:14px;padding:18px;box-shadow:0 20px 50px rgba(0,0,0,.25);max-height:80vh;display:flex;flex-direction:column;}
  .note-panel .np-title{font-size:13px;font-weight:800;color:var(--text);margin-bottom:10px;}
  .note-panel textarea{flex:1;min-height:220px;width:100%;border:1px solid var(--border);border-radius:10px;padding:12px;font-size:14px;font-family:inherit;line-height:1.5;resize:vertical;}
  .modal h3{margin:0 0 16px;font-size:17px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
  .field input,.field select,.field textarea{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;}
  .field textarea{resize:vertical;min-height:60px;line-height:1.4;}
  /* blockers checklist */
  .checklist{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
  .chk-item{display:flex;align-items:center;gap:8px;}
  .chk-item input[type=checkbox]{width:18px;height:18px;flex:none;cursor:pointer;accent-color:#d92d20;}
  .chk-item .txt{flex:1;padding:6px 8px;font-size:13px;border:1px solid var(--border);border-radius:7px;}
  .chk-item.done .txt{text-decoration:line-through;color:#98a2b3;}
  .chk-item .del{flex:none;border:none;background:transparent;color:#98a2b3;cursor:pointer;font-size:13px;width:24px;height:24px;border-radius:6px;}
  .chk-item .del:hover{background:#fee4e2;color:#d92d20;}
  .addrow{display:flex;gap:6px;}
  .addrow input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;}
  .addrow .btn{flex:none;}
  .datewrap{display:flex;align-items:center;gap:6px;}
  .datewrap input[type=date]{flex:1;min-width:0;}
  .dateclear{flex:none;width:30px;height:36px;border:1px solid var(--border);background:#fff;color:#98a2b3;border-radius:8px;cursor:pointer;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;}
  .dateclear:hover{background:#f5f7fa;color:#d92d20;border-color:#fecdca;}
  .field.row2{display:flex;gap:10px;}
  .field.row2>div{flex:1;min-width:0;}
  .swatches{display:flex;gap:8px;flex-wrap:wrap;}
  .swatch{width:28px;height:28px;border-radius:7px;cursor:pointer;border:2px solid transparent;}
  .swatch.sel{border-color:#1d2433;box-shadow:0 0 0 2px #fff inset;}
  .progress-row input[type=range]{width:100%;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px;}
  /* project modal phase blocks */
  .phase-block{border:1px solid var(--border);border-radius:10px;padding:12px 12px 6px;margin-bottom:10px;background:#fbfbfc;}
  .pb-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .pb-title{font-size:12px;font-weight:800;color:#475467;text-transform:uppercase;letter-spacing:.4px;}
  .pb-remove{border:none;background:transparent;color:#98a2b3;cursor:pointer;font-size:12px;font-weight:600;padding:2px 4px;border-radius:5px;}
  .pb-remove:hover{color:#d92d20;background:#fee4e2;}
  .pb-adv-toggle{border:none;background:transparent;color:#4c6fff;cursor:pointer;font-size:12px;font-weight:700;padding:4px 0;}
  .pb-adv{padding-top:6px;}
  .wiplab{display:flex;align-items:center;gap:8px;font-weight:500;text-transform:none;letter-spacing:0;padding-top:6px;}
  .wiplab input{width:auto;}

  /* ---------- Login gate ---------- */
  .gate{position:fixed;inset:0;z-index:1000;background:#fff;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;}
  .gate h1{font-size:34px;font-weight:900;letter-spacing:-.5px;margin:0;}
  .gate h1 span{color:#c4cad4;}
  .gate p{color:var(--muted);margin:0;font-size:14px;max-width:360px;}
  .gate .card{border:1px solid var(--border);border-radius:16px;padding:34px 40px;box-shadow:0 12px 40px rgba(16,24,40,.08);display:flex;flex-direction:column;align-items:center;gap:18px;}
  .gate .err{color:#d92d20;font-size:13px;font-weight:600;display:none;}
  .gate .setup{display:none;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:10px;padding:14px 16px;font-size:13px;text-align:left;max-width:420px;line-height:1.5;}
  .gate .setup code{background:#fff;border:1px solid #fed7aa;border-radius:4px;padding:1px 5px;font-size:12px;}
  .acct{display:none;align-items:center;gap:8px;}
  .acct .who{font-size:12px;color:var(--muted);font-weight:600;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
</style>
</head>
<body>
  <!-- Login gate -->
  <div class="gate" id="loginGate">
    <h1>ROADMAP PLANNING <span>2026</span></h1>
    <div class="card">
      <div id="gbtn"></div>
      <div class="err" id="gerr"></div>
      <div class="setup" id="gsetup">
        <b>Setup needed.</b> Open <code>index.html</code> and replace
        <code>GOOGLE_CLIENT_ID</code> near the top of the script with your Google OAuth Client ID.
        See <code>DEPLOY.md</code> for the 5-minute walkthrough.
      </div>
    </div>
  </div>

  <div class="topbar">
    <h1>ROADMAP PLANNING <span>2026</span></h1>
    <div class="spacer"></div>
    <div class="ctrl-group" id="viewToggle">
      <button data-view="quarter" class="active">Quarter</button>
      <button data-view="month">Month</button>
      <button data-view="week">Week</button>
    </div>
    <button class="iconbtn" id="exportBtn" title="Export JSON">⤓</button>
    <button class="iconbtn" id="importBtn" title="Import JSON">⤒</button>
    <input type="file" id="importFile" accept="application/json" style="display:none">
    <span id="syncStatus" style="font-size:12px;font-weight:600;color:var(--muted);min-width:80px;text-align:right;"></span>
    <div class="acct" id="acct">
      <span class="who" id="acctEmail"></span>
      <button class="iconbtn" id="signOut" title="Sign out">⏻</button>
    </div>
  </div>

  <div class="tabbar" id="tabbar"></div>

  <div class="subbar">
    <span class="squad-name" id="squadName"></span>
    <div style="display:flex;align-items:center;gap:6px;margin-left:6px;">
      <span style="font-size:12px;color:var(--muted);font-weight:600;">Tag</span>
      <select id="tagFilter" class="tagfilter"></select>
    </div>
    <div class="spacer"></div>
    <button class="btn" id="expandAll" title="Expand all projects and phases">⊞ Expand All</button>
    <button class="btn" id="collapseAll" title="Collapse all projects and phases">⊟ Collapse All</button>
    <div class="zoom">
      <span style="font-size:12px;color:var(--muted);font-weight:600;margin-right:4px;">Zoom</span>
      <button id="zoomOut">−</button>
      <button id="zoomIn">＋</button>
    </div>
  </div>

  <div class="gantt" id="gantt"></div>

  <!-- Modal -->
  <div class="modal-bg" id="modalBg">
    <div class="modal-wrap" id="modalWrap">
      <div class="modal" id="modal"></div>
      <div class="note-dock" id="noteDock" style="display:none">
        <button type="button" id="noteFab" class="note-fab" title="Note"></button>
        <div class="note-panel" id="notePanel" style="display:none">
          <div class="np-title">Note</div>
          <textarea id="m_note" placeholder="Add a note for this work…"></textarea>
        </div>
      </div>
    </div>
  </div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
/* ============================ Auth config ============================ */
/* 1) Create an OAuth Client ID at https://console.cloud.google.com/apis/credentials
 *    (type: Web application). 2) Add your origins under "Authorized JavaScript origins":
 *      http://localhost:3000   (local testing — file:// does NOT work with Google login)
 *      https://YOUR-APP.vercel.app   (after deploying)
 * 3) Paste the Client ID below. See DEPLOY.md for the full walkthrough. */
const GOOGLE_CLIENT_ID = '292601272916-9kkgsjlp8fdo9eskuj0lelufve2h7cvq.apps.googleusercontent.com';
const ALLOWED_DOMAIN  = 'everfit.io';

function load(){

/* Model: squad.projects[] = Categories; category.phases[] = Projects (each = one bar with
 * name + start/end + color); project.tasks[] = dev work.
 * Migration: older data used project.segments[] (multiple phases) -> collapse into one start/end. */
function migrate(s){
  (s.squads||[]).forEach(sq=>(sq.projects||[]).forEach((cat,ci)=>{
    if(!cat.color) cat.color = (cat.phases && cat.phases[0] && cat.phases[0].color) || PALETTE[ci%PALETTE.length];  // color is now per-category
    (cat.phases||[]).forEach(proj=>{
      // simplified model: a project is a single bar with start/end (no phases/segments)
      if(Array.isArray(proj.segments)){
        const starts=proj.segments.filter(x=>x.start).map(x=>x.start).sort();
        const ends=proj.segments.filter(x=>x.end).map(x=>x.end).sort();
        proj.start = starts[0] || '';
        proj.end = ends.length ? ends[ends.length-1] : '';
        delete proj.segments;
      }
      if(typeof proj.start!=='string') proj.start='';
      if(typeof proj.end!=='string') proj.end='';
      if(typeof proj.tag!=='string') proj.tag='';
      delete proj.color; delete proj.wip; delete proj.badge;   // color comes from the category now
      if(!Array.isArray(proj.tasks)) proj.tasks=[];
      delete proj.collapsed;   // collapse is now personal (state.uiCollapsed), not shared data
    });
  }));
  // per-view zoom (was a single shared value)
  if(!s.zoomByView || typeof s.zoomByView!=='object'){
    const z=s.zoom||1; s.zoomByView={quarter:z,month:z,week:z};
  }
  ['quarter','month','week'].forEach(v=>{ if(!s.zoomByView[v]) s.zoomByView[v]=1; });
  if(!s.uiCollapsed || typeof s.uiCollapsed!=='object') s.uiCollapsed={};   // personal, projectId -> true(collapsed)/false
  if(!s.viewBySquad || typeof s.viewBySquad!=='object') s.viewBySquad={};   // personal, squadId -> 'quarter'|'month'|'week'
  if(typeof s.tagFilter!=='string') s.tagFilter='';   // personal tag filter
  return s;
}

function toggleCollapsed(p){ state.uiCollapsed[p.id] = isCollapsed(p) ? false : true; }
function curView(){ return (state.viewBySquad && state.viewBySquad[state.activeSquad]) || state.view || 'quarter'; }

function curZoom(){ return (state.zoomByView && state.zoomByView[curView()]) || 1; }
function setZoom(z){ if(!state.zoomByView) state.zoomByView={}; state.zoomByView[curView()]=z; }
/* Local cache + shared-server sync.
 * - localStorage is an offline cache / fallback.
 * - The shared copy lives in the backend (/api/state) so the whole team sees it.
 * - Concurrency model: last-write-wins. We only adopt a teammate's remote copy when
 *   we have no unsaved local edits, and we suppress redundant pushes to avoid ping-pong. */
let idToken = null;            // current Google ID token (for API auth)
let baselineUpdatedAt = 0;     // server timestamp we are currently in sync with
let lastSyncedJSON = null;     // serialized state last confirmed on the server
let saveTimer = null;
let pollTimer = null;
let busy = false;              // true while dragging a bar (don't clobber)
let dragPhase = null;          // {projectId, phaseId} while dragging a phase row to reorder/move
let dragCat = null;            // categoryId while dragging a whole category to reorder
let dragTabId = null;          // squad id while dragging a tab to reorder

// Only the roadmap DATA (squads) is shared. View mode, active tab, zoom and collapse
// state live in `state` too but are NEVER sent to the backend and never overwritten by
// a teammate's copy — they persist per-browser via localStorage only.
function dataJSON(){ return JSON.stringify(state.squads); }
function save(){
  localStorage.setItem(STORE_KEY, JSON.stringify(state));   // full local cache incl. personal view
  if(!idToken) return;
  if(dataJSON() === lastSyncedJSON) return;   // data unchanged (only view/UI changed) -> don't push
  scheduleSave();
}
function scheduleSave(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(syncSave, 700);
}
function apiFetch(url, opts){
  opts = opts || {};
  opts.headers = Object.assign({}, opts.headers, { 'Authorization': 'Bearer ' + idToken });
  return fetch(url, opts);
}
function setSync(text, tone){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  el.textContent = text;
  el.style.color = tone === 'bad' ? '#d92d20' : tone === 'ok' ? '#067647' : 'var(--muted)';
}
async function syncSave(){
  if(!idToken) return;
  const payload = dataJSON();
  setSync('Saving…');
  try{
    const r = await apiFetch('/api/state', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({state:{squads:state.squads}})
    });
    if(r.status===401){ handleAuthExpired(); return; }
    if(r.ok){
      const j = await r.json();
      lastSyncedJSON = payload;
      baselineUpdatedAt = j.updatedAt || baselineUpdatedAt;
      setSync('Saved', 'ok');
    } else {
      const j = await r.json().catch(()=>({}));
      setSync(j.error==='storage_not_configured' ? 'No DB configured' : 'Save failed', 'bad');
    }
  }catch(e){ setSync('Offline — saved locally', 'bad'); }
}
async function syncLoad(){
  if(!idToken){ render(); return; }
  setSync('Loading…');
  try{
    const r = await apiFetch('/api/state', {method:'GET'});
    if(r.status===401){ handleAuthExpired(); return; }
    if(r.ok){
      const j = await r.json();
      const rec = j.record;
      if(rec && rec.state && rec.state.squads){
        adoptRemoteData(migrate(rec.state).squads, rec.updatedAt);
        setSync('Saved', 'ok');
      } else {
        // first ever run: seed the shared copy with whatever we have locally
        await syncSave();
      }
    } else {
      setSync('Offline — using local copy', 'bad');
    }
  }catch(e){ setSync('Offline — using local copy', 'bad'); }
  render();
}
// Replace only the shared data; keep this browser's personal view/tab/zoom/collapse.
function adoptRemoteData(squads, updatedAt){
  state.squads = squads;
  if(!state.squads.find(s=>s.id===state.activeSquad) && state.squads[0]) state.activeSquad=state.squads[0].id;
  baselineUpdatedAt = updatedAt || 0;
  lastSyncedJSON = dataJSON();
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
  render();
}
async function pollRemote(){
  if(!idToken || busy) return;
  if(modalBg.classList.contains('open')) return;     // editing -> don't interrupt
  if(dataJSON() !== lastSyncedJSON) return;           // local data edits pending -> our save wins
  try{
    const r = await apiFetch('/api/state', {method:'GET'});
    if(r.status===401){ handleAuthExpired(); return; }
    if(!r.ok) return;
    const j = await r.json();
    const rec = j.record;
    if(rec && rec.state && rec.state.squads && rec.updatedAt > baselineUpdatedAt){
      adoptRemoteData(migrate(rec.state).squads, rec.updatedAt);
      setSync('Updated by ' + (rec.updatedBy||'teammate'), 'ok');
    }
  }catch(e){ /* offline: keep working locally */ }
}
function startPolling(){ if(pollTimer) clearInterval(pollTimer); pollTimer = setInterval(pollRemote, 12000); }
function stopPolling(){ if(pollTimer) clearInterval(pollTimer); pollTimer = null; }
function handleAuthExpired(){
  stopPolling();
  idToken = null;
  localStorage.removeItem(AUTH_KEY);
  showGate();
  authError('Session expired — please sign in again.');
}

/* ============================ Timeline math ============================ */
function gatherDates(squad){
  const ds=[];
  squad.projects.forEach(cat=>cat.phases.forEach(proj=>{
    if(proj.start)ds.push(parse(proj.start)); if(proj.end)ds.push(parse(proj.end));
    (proj.tasks||[]).forEach(t=>{if(t.start)ds.push(parse(t.start)); if(t.end)ds.push(parse(t.end));});
  }));
  return ds;
}
function quarterStart(d){return new Date(d.getFullYear(),Math.floor(d.getMonth()/3)*3,1);}
function buildUnits(squad){
  const ds=gatherDates(squad);
  let min,max;
  if(ds.length){min=new Date(Math.min(...ds));max=new Date(Math.max(...ds));}
  else{min=new Date();max=addMonths(new Date(),3);}
  const today=new Date(); if(today<min)min=today; if(today>max)max=today;

  const view=curView();
  const base = view==='quarter'?170 : view==='month'?200 : 30;
  // pass 1: build the unit list (no widths yet)
  const units=[];
  if(view==='quarter'){
    let cur=quarterStart(min);const end=quarterStart(max);
    while(cur<=end){ const next=addMonths(cur,3); const q=Math.floor(cur.getMonth()/3)+1;
      units.push({start:cur,end:next,label:'Q'+q,sub:String(cur.getFullYear())}); cur=next; }
  }else if(view==='month'){
    let cur=new Date(min.getFullYear(),min.getMonth(),1);const end=new Date(max.getFullYear(),max.getMonth(),1);
    while(cur<=end){ const next=addMonths(cur,1);
      units.push({start:cur,end:next,label:MONTHS[cur.getMonth()],sub:"'"+String(cur.getFullYear()).slice(2)}); cur=next; }
  }else{ // week = day-level columns
    let cur=new Date(min.getFullYear(),min.getMonth(),min.getDate());
    let end=new Date(max.getFullYear(),max.getMonth(),max.getDate());
    while(cur.getDay()!==1) cur=addDays(cur,-1);   // snap start back to Monday
    while(end.getDay()!==0) end=addDays(end,1);     // snap end forward to Sunday
    while(cur<=end){ const next=addDays(cur,1);
      units.push({start:cur,end:next,day:cur.getDate(),dow:cur.getDay()}); cur=next; }
  }
  // pass 2: size columns — stretch to fill the viewport when the range is short
  let w = base*curZoom();
  const avail = availTrackWidth();
  if(units.length && avail>0){ const fit=(avail-LEFTPAD)/units.length; if(fit>w) w=fit; }
  let x=LEFTPAD;   // left gutter for the connector thread
  units.forEach(u=>{ u.x=x; u.width=w; x+=w; });
  return units;
}
// visible width available for the timeline track (viewport minus the sticky left panel)
function availTrackWidth(){
  const g=document.getElementById('gantt');
  if(!g) return 0;
  const leftW=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--left-w'))||328;
  return Math.max(0, g.clientWidth - leftW - 1);
}
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW=['S','M','T','W','T','F','S'];   // index by getDay() (0=Sun)
function totalWidth(units){return units.length?units[units.length-1].x+units[units.length-1].width:0;}
function dateToX(d,units){
  if(!units.length)return 0;
  if(d<=units[0].start)return units[0].x;
  const last=units[units.length-1];
  if(d>=last.end)return last.x+last.width;
  for(const u of units){
    if(d>=u.start&&d<u.end) return u.x+(d-u.start)/(u.end-u.start)*u.width;
  }
  return units[0].x;
}
function xToDate(x,units){
  if(!units.length)return new Date();
  for(const u of units){
    if(x>=u.x&&x<=u.x+u.width){
      const frac=(x-u.x)/u.width;
      const ms=u.start.getTime()+frac*(u.end-u.start);
      const d=new Date(ms); return new Date(d.getFullYear(),d.getMonth(),d.getDate());
    }
  }
  const last=units[units.length-1];
  return x<0?units[0].start:last.end;
}

/* ============================ Color helper ============================ */
function rgba(hex,a){const h=hex.replace('#','');const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return `rgba(${r},${g},${b},${a})`;}
// gradient quarter header: dark navy -> light gray, like the Figma reference
function headShade(i,n){
  const t = n<=1?0:i/(n-1);
  const dark=[26,34,51], light=[197,202,212];   // #1a2233 -> #c5cad4
  const r=Math.round(dark[0]+(light[0]-dark[0])*t);
  const g=Math.round(dark[1]+(light[1]-dark[1])*t);
  const b=Math.round(dark[2]+(light[2]-dark[2])*t);
  const lum=(0.299*r+0.587*g+0.114*b);
  return {bg:`rgb(${r},${g},${b})`, fg: lum>150?'#101828':'#ffffff'};
}

function render(){
  renderTabs();
  document.getElementById('squadName').textContent=activeSquad().name;
  document.querySelectorAll('#viewToggle button').forEach(b=>b.classList.toggle('active',b.dataset.view===curView()));
  renderTagFilter();
  renderGantt();
  save();
}
function renderTagFilter(){
  const sel=document.getElementById('tagFilter'); if(!sel)return;
  const used=new Set();
  activeSquad().projects.forEach(cat=>cat.phases.forEach(pr=>{ if(pr.tag) used.add(pr.tag); }));
  const tags=[...new Set([...PREDEFINED_TAGS.filter(t=>used.has(t)), ...[...used].filter(t=>!PREDEFINED_TAGS.includes(t))])];
  if(state.tagFilter && !used.has(state.tagFilter)) state.tagFilter='';   // filtered tag no longer exists
  sel.innerHTML='<option value="">All tags</option>'+tags.map(t=>`<option value="${esc(t)}" ${t===state.tagFilter?'selected':''}>${esc(t)}</option>`).join('');
}

function clearTabMarks(keepDragging){
  document.querySelectorAll('.tab-before,.tab-after').forEach(t=>t.classList.remove('tab-before','tab-after'));
  if(!keepDragging){ document.querySelectorAll('.tab-dragging').forEach(t=>t.classList.remove('tab-dragging')); dragTabId=null; }
}
function reorderSquads(dragId,targetId,after){
  const arr=state.squads;
  const from=arr.findIndex(s=>s.id===dragId);
  if(from<0){clearTabMarks();return;}
  const [moved]=arr.splice(from,1);
  let to=arr.findIndex(s=>s.id===targetId);
  if(to<0) to=arr.length; else if(after) to+=1;
  arr.splice(to,0,moved);
  clearTabMarks();
  render();
}
function renderTabs(){
  const bar=document.getElementById('tabbar');
  bar.innerHTML='';
  state.squads.forEach(s=>{
    const tab=document.createElement('div');
    tab.className='tab'+(s.id===state.activeSquad?' active':'');
    tab.innerHTML=`<span class="tname" contenteditable="false">${esc(s.name)}</span><button class="x" title="Close">×</button>`;
    tab.onclick=e=>{ if(e.target.classList.contains('x'))return; state.activeSquad=s.id; render(); };
    const nameEl=tab.querySelector('.tname');
    tab.querySelector('.tname').ondblclick=()=>{
      nameEl.contentEditable='true'; nameEl.focus();
      document.execCommand('selectAll',false,null);
    };
    nameEl.onblur=()=>{nameEl.contentEditable='false'; tab.draggable=true; s.name=nameEl.textContent.trim()||'Squad'; render();};
    nameEl.onkeydown=ev=>{if(ev.key==='Enter'){ev.preventDefault();nameEl.blur();}};
    tab.querySelector('.x').onclick=()=>{
      if(state.squads.length===1){alert('At least one squad is required.');return;}
      if(!confirm('Close squad "'+s.name+'"?'))return;
      state.squads=state.squads.filter(x=>x.id!==s.id);
      if(state.activeSquad===s.id)state.activeSquad=state.squads[0].id;
      render();
    };
    // drag to reorder tabs
    tab.draggable=true;
    tab.addEventListener('dragstart',e=>{ dragTabId=s.id; tab.classList.add('tab-dragging'); e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain',s.id);}catch(_){} });
    tab.addEventListener('dragend',clearTabMarks);
    tab.addEventListener('dragover',e=>{
      if(!dragTabId||dragTabId===s.id)return;
      e.preventDefault();
      const r=tab.getBoundingClientRect();
      clearTabMarks(true);
      tab.classList.add(e.clientX > r.left+r.width/2 ? 'tab-after' : 'tab-before');
    });
    tab.addEventListener('drop',e=>{
      if(!dragTabId||dragTabId===s.id){clearTabMarks();return;}
      e.preventDefault();
      const r=tab.getBoundingClientRect();
      reorderSquads(dragTabId, s.id, e.clientX > r.left+r.width/2);
    });
    // editing the name shouldn't start a drag
    tab.querySelector('.tname').addEventListener('dblclick',()=>{ tab.draggable=false; });
    bar.appendChild(tab);
  });
  const add=document.createElement('button');
  add.className='tab-add'; add.textContent='+'; add.title='New squad';
  add.onclick=()=>{const id=uid();state.squads.push({id,name:'Squad '+(state.squads.length+1),projects:[]});state.activeSquad=id;render();};
  bar.appendChild(add);
}

function renderGantt(){
  const squad=activeSquad();
  const units=buildUnits(squad);
  const tw=totalWidth(units);
  const g=document.getElementById('gantt');
  g.innerHTML='';
  const grid=document.createElement('div'); grid.className='grid';

  // header
  const hdView=curView();
  const head=document.createElement('div'); head.className='head'+(hdView==='week'?' week':hdView==='month'?' month':'');
  const hl=document.createElement('div'); hl.className='left';
  hl.innerHTML='<span>PROJECT / PHASE / WORK</span>';
  const addCat=document.createElement('button'); addCat.className='hdr-add'; addCat.textContent='+'; addCat.title='New category';
  addCat.onclick=()=>openProjectModal();
  hl.appendChild(addCat);
  const ht=document.createElement('div'); ht.className='track'; ht.style.width=tw+'px';
  if(hdView==='week'){
    buildWeekHeader(units,ht);
  }else if(hdView==='month'){
    buildMonthHeader(units,ht);
  }else{
    const baseYear=units.length?units[0].start.getFullYear():new Date().getFullYear();
    units.forEach((u,i)=>{
      const c=document.createElement('div'); c.className='headcell';
      c.style.left=u.x+'px'; c.style.width=u.width+'px';
      const shade=headShade(i,units.length);
      c.style.background=shade.bg; c.style.color=shade.fg;
      const yr=u.start.getFullYear();
      let txt=u.label;
      if(yr!==baseYear) txt=u.label+'/'+yr;
      c.innerHTML=txt;
      ht.appendChild(c);
    });
  }
  // "Today" dot + label pinned at the bottom of the header, above the dashed line
  const tmx=todayCenterX(units);
  const tmark=document.createElement('div'); tmark.className='today-mark'; tmark.style.left=tmx+'px';
  tmark.innerHTML='<span class="dot"></span><span class="lbl">Today</span>';
  ht.appendChild(tmark);
  head.appendChild(hl); head.appendChild(ht); grid.appendChild(head);

  if(!squad.projects.length){
    const e=document.createElement('div'); e.className='empty'; e.textContent='No categories yet. Click the ＋ in the PROJECT / PHASE / WORK header to add one.';
    grid.appendChild(e); g.appendChild(grid); return;
  }

  const tf=state.tagFilter||'';
  squad.projects.forEach(p=>{
    const projs = tf ? p.phases.filter(x=>x.tag===tf) : p.phases;
    if(tf && projs.length===0) return;   // hide categories with no matching projects under a filter
    grid.appendChild(projectRow(p,units,tw));
    projs.forEach(ph=>{
      grid.appendChild(phaseRow(p,ph,units,tw));
      if(!isCollapsed(ph)){
        // project start -> root of the timeline connector thread for its dev work
        const projStartDate=effStart(ph,units);
        const projStartX=dateToX(projStartDate,units);

}

// x centered on today's day block (avg of the day's left and right edges)
function todayCenterX(units){
  const n=new Date(); const t0=new Date(n.getFullYear(),n.getMonth(),n.getDate()); const t1=addDays(t0,1);
  return (dateToX(t0,units)+dateToX(t1,units))/2;
}
function gridlinesEl(units,tw){
  const gl=document.createElement('div'); gl.className='gridlines';
  const view=curView(), wk=view==='week', mo=view==='month';
  units.forEach(u=>{
    const c=document.createElement('div');c.className='col';c.style.left=u.x+'px';c.style.width=u.width+'px';
    if(wk && (u.dow===0||u.dow===6)) c.style.background='rgba(16,24,40,.035)';   // shade weekends
    gl.appendChild(c);
    if(mo){ for(let k=1;k<4;k++){ const s=document.createElement('div');s.className='subcol';s.style.left=(u.x+k*u.width/4)+'px';gl.appendChild(s); } }  // W1-W4 lines
  });

  const tl=document.createElement('div'); tl.className='today'; tl.style.left=todayCenterX(units)+'px';
  gl.appendChild(tl);

}
// Two-tier header for Week view: month band on top, day-number + weekday letter below.
function buildWeekHeader(units,ht){
  // month groups (top band)
  const groups=[]; let g=null;
  units.forEach(u=>{

    if(!g||g.key!==key){ g={key,label:MONTHS[u.start.getMonth()]+" '"+String(u.start.getFullYear()).slice(2),x:u.x,width:u.width}; groups.push(g); }

// Three-tier header for Month view: year band on top, month band, then W1-W4 cells.
function buildMonthHeader(units,ht){

function taskRow(p,ph,t,units,tw,last,projStartX,projStartDate){

  ],{connector:true,last:!!last});

  if(hasNote) tip.push('Note:\n'+t.note);

  // project's start, with a visible elbow branching into each work bar.

    const bx=dateToX(effStart(t,units,projStartDate),units);
    const cx=Math.max(2, projStartX-14);             // sit in the gutter, left of the bars
    const v=document.createElement('div'); v.className='tl-v'+(last?' last':''); v.style.left=cx+'px';
    track.appendChild(v);
    const h=document.createElement('div'); h.className='tl-h';

    track.appendChild(h);
  }
  if(t.start||t.end){
    const lbl=baseLabel+(showPct?' '+t.progress+'%':'');

function makeBar(color,label,progress,onEdit,opts){
  opts=opts||{};
  const bar=document.createElement('div'); bar.className='bar'+(opts.wip?' wip':'');
  if(opts.wip){ bar.style.color=mix(color,0.55); }
  else if(progress===null){
    // project bar: Miro-style solid pastel fill + darker matching-hue text
    bar.style.background= color;
    bar.style.color = mix(color,0.62);
    bar.style.boxShadow = '0 1px 2px rgba(16,24,40,.12)';
  } else {
    // dev-work bar: solid translucent fill with a progress fill
    bar.style.background= rgba(color,.28);
    bar.style.color = '#1d2433';
    const fill=document.createElement('div'); fill.className='fill'; fill.style.width=Math.min(100,progress)+'%'; fill.style.background=rgba(color,.85);
    bar.appendChild(fill);
  }
  const span=document.createElement('span'); span.className='barlabel'; span.textContent=label; bar.appendChild(span);
  if(opts.badge){const bg=document.createElement('span');bg.className='badge';bg.textContent=opts.badge;bar.appendChild(bg);}
  const hl=document.createElement('div'); hl.className='handle l'; const hr=document.createElement('div'); hr.className='handle r';
  bar.appendChild(hl); bar.appendChild(hr);
  bar._onEdit=onEdit;
  return bar;
}
function mix(hex,t){const h=hex.replace('#','');let r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);r=Math.round(r*(1-t));g=Math.round(g*(1-t));b=Math.round(b*(1-t));return `rgb(${r},${g},${b})`;}
// Effective dates: blank start -> first date in view; blank end -> last date in view.
function effStart(obj,units,fb){ return obj.start ? parse(obj.start) : (fb || (units.length?units[0].start:new Date())); }
function effEnd(obj,units){ return obj.end ? parse(obj.end) : (units.length?addDays(units[units.length-1].end,-1):new Date()); }
function placeBar(bar,obj,units,fb){
  const x=dateToX(effStart(obj,units,fb),units);
  const w=Math.max(dateToX(addDays(effEnd(obj,units),1),units)-x, 6);
  bar.style.left=x+'px'; bar.style.width=w+'px';
}

/* ---------- Drag move / resize ---------- */
function attachDrag(bar,obj,units,kind,parent,fb){
  let mode=null,startX=0,moved=false,origStart,origEnd;
  function down(e,m){
    e.preventDefault(); e.stopPropagation();
    mode=m; startX=e.clientX; moved=false; busy=true;
    origStart=effStart(obj,units,fb); origEnd=effEnd(obj,units);
    bar.classList.add('dragging');
    window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
  }
  function dayDelta(dx){
    // approximate days per pixel from first unit
    const u=units[0]; const dpp=(u.end-u.start)/86400000/u.width;
    return Math.round(dx*dpp);
  }
  function move(e){
    const dx=e.clientX-startX; if(Math.abs(dx)>3)moved=true;
    const dd=dayDelta(dx);
    let ns=new Date(origStart), ne=new Date(origEnd);
    if(mode==='move'){ns=addDays(origStart,dd);ne=addDays(origEnd,dd); obj.start=fmt(ns); obj.end=fmt(ne);}
    if(mode==='l'){ns=addDays(origStart,dd); if(ns>=ne)ns=addDays(ne,-1); obj.start=fmt(ns);}
    if(mode==='r'){ne=addDays(origEnd,dd); if(ne<=ns)ne=addDays(ns,1); obj.end=fmt(ne);}
    placeBar(bar,obj,units);
  }
  function up(){
    bar.classList.remove('dragging');
    window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',up);
    if(moved){ if(kind==='phase')clampPhase(parent,obj); render(); }
    else { bar._onEdit&&bar._onEdit(); }
    mode=null; busy=false;
  }
  bar.addEventListener('mousedown',e=>down(e,'move'));
  bar.querySelector('.handle.l').addEventListener('mousedown',e=>down(e,'l'));
  bar.querySelector('.handle.r').addEventListener('mousedown',e=>down(e,'r'));
}
function clampPhase(){/* hook for future auto-expand of phase to fit tasks */}

/* ---------- Drag a phase row between projects / reorder ---------- */
function clearDropMarks(){
  document.querySelectorAll('.drop-into,.drop-before,.row-dragging')
    .forEach(el=>el.classList.remove('drop-into','drop-before','row-dragging'));
}
function wireDropTarget(row,projectId,beforePhaseId){
  row.addEventListener('dragover',e=>{
    if(!dragPhase)return;
    e.preventDefault(); e.dataTransfer.dropEffect='move';
    clearDropMarks();
    row.classList.add(beforePhaseId ? 'drop-before' : 'drop-into');
  });
  row.addEventListener('drop',e=>{
    if(!dragPhase)return;
    e.preventDefault();
    movePhase(dragPhase, projectId, beforePhaseId);
  });
}
function makePhaseDraggable(left,row,projectId,phaseId){
  left.setAttribute('draggable','true');
  left.classList.add('drag-src');
  left.addEventListener('dragstart',e=>{
    dragPhase={projectId,phaseId};
    e.dataTransfer.effectAllowed='move';
    try{e.dataTransfer.setData('text/plain',phaseId);}catch(_){}
    row.classList.add('row-dragging');
  });
  left.addEventListener('dragend',()=>{ dragPhase=null; clearDropMarks(); });
}
function movePhase(src,destProjectId,beforePhaseId){
  const squad=activeSquad();
  const srcProj=squad.projects.find(x=>x.id===src.projectId);
  const destProj=squad.projects.find(x=>x.id===destProjectId);
  if(!srcProj||!destProj){ dragPhase=null; clearDropMarks(); return; }
  const idx=srcProj.phases.findIndex(x=>x.id===src.phaseId);
  if(idx<0){ dragPhase=null; clearDropMarks(); return; }
  const [phase]=srcProj.phases.splice(idx,1);
  if(beforePhaseId && beforePhaseId!==phase.id){
    const bidx=destProj.phases.findIndex(x=>x.id===beforePhaseId);
    destProj.phases.splice(bidx<0?destProj.phases.length:bidx,0,phase);
  } else {
    destProj.phases.push(phase);
  }
  dragPhase=null; clearDropMarks(); render();
}

/* ---------- Drag a whole category to reorder (its projects move with it) ---------- */
function clearCatMarks(){
  document.querySelectorAll('.cat-before,.cat-after,.cat-dragging')
    .forEach(el=>el.classList.remove('cat-before','cat-after','cat-dragging'));
}
function makeCatDraggable(left,row,catId){
  left.setAttribute('draggable','true');
  left.classList.add('drag-src');
  left.addEventListener('dragstart',e=>{
    dragCat=catId;
    e.dataTransfer.effectAllowed='move';
    try{e.dataTransfer.setData('text/plain',catId);}catch(_){}
    row.classList.add('cat-dragging');
  });
  left.addEventListener('dragend',()=>{ dragCat=null; clearCatMarks(); });
}
function wireCatDrop(row,catId){
  row.addEventListener('dragover',e=>{
    if(!dragCat || dragCat===catId) return;
    e.preventDefault(); e.dataTransfer.dropEffect='move';
    clearCatMarks();
    const r=row.getBoundingClientRect();
    row.classList.add(e.clientY > r.top+r.height/2 ? 'cat-after' : 'cat-before');
  });
  row.addEventListener('drop',e=>{
    if(!dragCat || dragCat===catId) return;
    e.preventDefault();
    const r=row.getBoundingClientRect();
    reorderCategories(dragCat, catId, e.clientY > r.top+r.height/2);
  });
}
function reorderCategories(dragId,targetId,after){
  const arr=activeSquad().projects;
  const from=arr.findIndex(c=>c.id===dragId);
  if(from<0){ dragCat=null; clearCatMarks(); return; }
  const [moved]=arr.splice(from,1);
  let to=arr.findIndex(c=>c.id===targetId);
  if(to<0) to=arr.length; else if(after) to+=1;
  arr.splice(to,0,moved);
  dragCat=null; clearCatMarks(); render();
}

    if(editing){ proj.name=name; proj.start=start; proj.end=end; proj.tag=tag; }
    else category.phases.push({id:uid(),name,start,end,tag,tasks:[]});
    closeModal();render();
  };
}

function openTaskModal(phase,t){
  const editing=!!t;
  const used=phase.tasks.map(x=>x.type);
  const def=t||{type:(TASK_TYPES.find(tt=>tt.key!=='custom'&&!used.includes(tt.key))||TASK_TYPES[0]).key,start:'',end:'',progress:0,customName:'',note:''};
  modal.innerHTML=`<h3>${editing?'Edit':'Add'} Development Work</h3>
    <div class="field"><label>Discipline</label><select id="m_type">${TASK_TYPES.map(tt=>`<option value="${tt.key}" ${tt.key===def.type?'selected':''}>${tt.label}</option>`).join('')}</select></div>
    <div class="field" id="m_namerow"><label>Work name</label><input id="m_cname" value="${esc(def.customName||'')}" placeholder="e.g. Data migration, Spike, Review"></div>
    <div class="field row2">
      <div><label>Start (optional)</label>${dateField('m_start',def.start)}</div>
      <div><label>End (optional)</label>${dateField('m_end',def.end)}</div>
    </div>
    <div class="field" style="margin-top:-6px;"><span style="font-size:11px;color:var(--muted);">Leave a date blank to extend to the edge of the current view.</span></div>
    <div class="field progress-row" id="m_prow"><label>Progress: <span id="m_pval">${def.progress||0}</span>%</label><input type="range" min="0" max="100" id="m_prog" value="${def.progress||0}"></div>
    <div class="field"><label>Blockers</label>
      <div id="m_blockers" class="checklist"></div>
      <div class="addrow"><input id="m_blkinput" placeholder="Add a blocker…"><button type="button" class="btn" id="m_blkadd">Add</button></div>
    </div>
    <div class="modal-actions"><button class="btn" id="m_cancel">Cancel</button><button class="btn primary" id="m_save">Save</button></div>`;
  const typeSel=modal.querySelector('#m_type'), prow=modal.querySelector('#m_prow'), namerow=modal.querySelector('#m_namerow');
  const prog=modal.querySelector('#m_prog'), pval=modal.querySelector('#m_pval');
  function syncType(){
    prow.style.display=TASK_MAP[typeSel.value].progress?'block':'none';
    namerow.style.display=typeSel.value==='custom'?'block':'none';
  }
  syncType(); typeSel.onchange=syncType;
  prog.oninput=()=>pval.textContent=prog.value;
  // floating Note button + side popup (outside the modal, to the right).
  // Auto-expanded if a note exists, collapsed otherwise.
  const noteDock=document.getElementById('noteDock'), noteBtn=document.getElementById('noteFab'), notePanel=document.getElementById('notePanel'), noteTa=document.getElementById('m_note');
  noteBtn.innerHTML=NOTE_ICON; noteDock.style.display='flex';
  noteTa.value=def.note||'';
  let noteOpen = !!(def.note && def.note.trim());
  function syncNote(){
    notePanel.style.display=noteOpen?'flex':'none';
    noteBtn.classList.toggle('open',noteOpen);
    noteBtn.classList.toggle('has',noteTa.value.trim()!=='');
  }
  syncNote();
  noteBtn.onclick=()=>{ noteOpen=!noteOpen; syncNote(); if(noteOpen) noteTa.focus(); };
  noteTa.oninput=()=>noteBtn.classList.toggle('has',noteTa.value.trim()!=='');
  // Blockers checklist (Jira-style): add items, check done, remove
  const blockers=(def.blockers||[]).map(b=>({id:b.id||uid(),text:b.text||'',done:!!b.done}));
  const blkWrap=modal.querySelector('#m_blockers');
  function renderBlockers(){
    blkWrap.innerHTML='';
    blockers.forEach((b,i)=>{
      const r=document.createElement('div'); r.className='chk-item'+(b.done?' done':'');
      r.innerHTML=`<input type="checkbox" ${b.done?'checked':''}><input class="txt" value="${esc(b.text)}" placeholder="Blocker…"><button type="button" class="del" title="Remove">✕</button>`;
      r.querySelector('input[type=checkbox]').onchange=e=>{b.done=e.target.checked;renderBlockers();};
      r.querySelector('.txt').oninput=e=>b.text=e.target.value;
      r.querySelector('.del').onclick=()=>{blockers.splice(i,1);renderBlockers();};
      blkWrap.appendChild(r);
    });
  }
  renderBlockers();
  const blkInput=modal.querySelector('#m_blkinput');
  function addBlk(){ const v=blkInput.value.trim(); if(!v)return; blockers.push({id:uid(),text:v,done:false}); blkInput.value=''; renderBlockers(); blkInput.focus(); }
  modal.querySelector('#m_blkadd').onclick=addBlk;
  blkInput.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault();addBlk();} };
  wireDateClears();
  modalBg.classList.add('open');
  modal.querySelector('#m_cancel').onclick=closeModal;
  modal.querySelector('#m_save').onclick=()=>{
    const type=typeSel.value;
    const customName=type==='custom'?modal.querySelector('#m_cname').value.trim():'';
    if(type==='custom' && !customName){alert('Please enter a name for the custom work.');return;}
    if(type!=='custom' && !editing && used.includes(type) && !confirm(TASK_MAP[type].label+' work already exists in this phase. Add another?'))return;
    const start=modal.querySelector('#m_start').value,end=modal.querySelector('#m_end').value;
    if(start&&end&&end<start){alert('End date must be on or after start date.');return;}
    const progress=TASK_MAP[type].progress?Number(prog.value):0;
    const note=document.getElementById('m_note').value.trim();
    const blk=blockers.filter(b=>b.text.trim()).map(b=>({id:b.id,text:b.text.trim(),done:b.done}));
    if(editing)Object.assign(t,{type,start,end,progress,customName,note,blockers:blk});
    else phase.tasks.push({id:uid(),type,start,end,progress,customName,note,blockers:blk});
    closeModal();render();
  };
}

/* ============================ Misc UI ============================ */
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

(function(){
  const el=document.getElementById('squadName');
  el.title='Double-click to rename squad';
  el.ondblclick=()=>{el.contentEditable='true';el.focus();document.execCommand('selectAll',false,null);};
  el.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();el.blur();}else if(e.key==='Escape'){el.textContent=activeSquad().name;el.blur();}};
  el.onblur=()=>{el.contentEditable='false';const v=el.textContent.trim()||'Squad';activeSquad().name=v;render();};
})();
document.querySelectorAll('#viewToggle button').forEach(b=>b.onclick=()=>{setView(b.dataset.view);render();});
document.getElementById('zoomIn').onclick=()=>{setZoom(Math.min(3,curZoom()*1.25));render();};
document.getElementById('zoomOut').onclick=()=>{setZoom(Math.max(.4,curZoom()/1.25));render();};
function setAllCollapsed(v){
  activeSquad().projects.forEach(cat=>cat.phases.forEach(proj=>{ state.uiCollapsed[proj.id]=v; }));
  render();
}
document.getElementById('expandAll').onclick=()=>setAllCollapsed(false);
document.getElementById('collapseAll').onclick=()=>setAllCollapsed(true);
document.getElementById('tagFilter').onchange=e=>{ state.tagFilter=e.target.value; render(); };
// re-fit the timeline width when the window resizes
let _resizeTimer=null;
window.addEventListener('resize',()=>{
  clearTimeout(_resizeTimer);
  _resizeTimer=setTimeout(()=>{ if(document.getElementById('loginGate').style.display==='none') renderGantt(); },150);
});

document.getElementById('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='roadmap.json';a.click();
};
document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange=e=>{
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(d.squads){state=d;if(!state.activeSquad)state.activeSquad=state.squads[0].id;render();}}catch(err){alert('Invalid file');}};
  r.readAsText(f);
};

/* ============================ Auth flow ============================ */
function decodeJwt(token){
  const part=token.split('.')[1];
  const json=decodeURIComponent(atob(part.replace(/-/g,'+').replace(/_/g,'/'))
    .split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
  return JSON.parse(json);
}
function loadAuth(){
  try{const a=JSON.parse(localStorage.getItem(AUTH_KEY));
    if(a&&a.email&&a.exp&&a.exp>Date.now()&&a.idToken&&a.email.toLowerCase().endsWith('@'+ALLOWED_DOMAIN))return a;}catch(e){}
  return null;
}
function authError(msg){const e=document.getElementById('gerr');e.textContent=msg;e.style.display='block';}
function showGate(){
  document.getElementById('loginGate').style.display='flex';
  document.getElementById('acct').style.display='none';
  initGoogle();
}
function showApp(auth){
  idToken = auth.idToken;
  document.getElementById('loginGate').style.display='none';
  document.getElementById('acct').style.display='flex';
  document.getElementById('acctEmail').textContent=auth.email;
  syncLoad().then(startPolling);   // pull the shared copy, then watch for teammates' changes
}
function onCredential(resp){
  let p; try{p=decodeJwt(resp.credential);}catch(e){authError('Sign-in failed. Please try again.');return;}
  const email=(p.email||'').toLowerCase();
  if(!p.email_verified || !email.endsWith('@'+ALLOWED_DOMAIN)){
    if(window.google) google.accounts.id.disableAutoSelect();
    authError('Access is restricted to @'+ALLOWED_DOMAIN+' accounts.');
    return;
  }
  const auth={email:p.email,name:p.name||'',exp:(p.exp||0)*1000,idToken:resp.credential};
  localStorage.setItem(AUTH_KEY,JSON.stringify(auth));
  showApp(auth);
}
function initGoogle(){
  if(GOOGLE_CLIENT_ID.startsWith('YOUR_')){document.getElementById('gsetup').style.display='block';return;}
  if(!window.google||!google.accounts||!google.accounts.id){setTimeout(initGoogle,200);return;}
  google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:onCredential,hd:ALLOWED_DOMAIN,auto_select:true});
  google.accounts.id.renderButton(document.getElementById('gbtn'),{theme:'outline',size:'large',width:280,text:'signin_with',shape:'pill'});
  google.accounts.id.prompt();
}
document.getElementById('signOut').onclick=()=>{
  stopPolling();
  idToken=null; lastSyncedJSON=null; baselineUpdatedAt=0;
  localStorage.removeItem(AUTH_KEY);
  if(window.google&&google.accounts) google.accounts.id.disableAutoSelect();
  showGate();
};

(function bootstrap(){
  const saved=loadAuth();
  if(saved) showApp(saved); else showGate();
})();
</script>
