<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ctext%20y='.9em'%20font-size='88'%3E🗺️%3C/text%3E%3C/svg%3E" />
<title>Roadmap Planning Dashboard</title>
<style>
  :root{
    --bg:#ffffff; --panel:#ffffff; --border:#e8eaef; --text:#101828;
    --muted:#8a93a3; --left-w:328px; --row-h:60px; --head-h:48px;
    --tab-h:40px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text);background:var(--bg);}
  body{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

  /* ---------- Top bar ---------- */
  .topbar{display:flex;align-items:center;gap:16px;padding:16px 24px 10px;background:#fff;}
  .topbar h1{font-size:30px;margin:0;font-weight:900;letter-spacing:-.5px;color:#101828;}
  .topbar h1 span{color:#c4cad4;font-weight:900;}
  .topbar .spacer{flex:1;}
  .ctrl-group{display:flex;align-items:center;gap:4px;background:#f0f1f4;border-radius:9px;padding:3px;}
  .ctrl-group button{background:transparent;border:none;color:#667085;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:700;}
  .ctrl-group button.active{background:#101828;color:#fff;}
  .ctrl-group button:hover:not(.active){color:#101828;}
  .topbar .iconbtn{background:#f0f1f4;border:none;color:#667085;width:36px;height:36px;border-radius:9px;cursor:pointer;font-size:16px;display:inline-flex;align-items:center;justify-content:center;}
  .topbar .iconbtn:hover{color:#101828;background:#e6e8ec;}

  /* ---------- Tabs (Chrome-like) ---------- */
  .tribebar{display:flex;align-items:center;gap:8px;background:#eceff3;padding:8px 14px;border-bottom:1px solid var(--border);overflow-x:auto;}
  .tribe{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);background:#fff;border:1px solid var(--border);white-space:nowrap;}
  .tribe:hover{color:var(--text);}
  .tribe.active{background:#101828;color:#fff;border-color:#101828;}
  .tribe .tr-x{border:none;background:transparent;color:inherit;opacity:.6;cursor:pointer;font-size:15px;line-height:1;padding:0 2px;border-radius:4px;}
  .tribe .tr-x:hover{opacity:1;}
  .tribe-add{border:1px dashed var(--border);background:transparent;color:var(--muted);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;}
  .tribe-add:hover{color:var(--text);border-color:#98a2b3;}
  .tabbar{display:flex;align-items:flex-end;gap:2px;background:#dfe3ea;padding:6px 10px 0;overflow-x:auto;}
  .tab{display:flex;align-items:center;gap:8px;background:#eceff3;border:1px solid var(--border);border-bottom:none;
       border-radius:10px 10px 0 0;padding:9px 12px 9px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);
       white-space:nowrap;position:relative;top:1px;max-width:240px;}
  .tab:hover{background:#f5f7fa;}
  .tab.active{background:var(--panel);color:var(--text);box-shadow:0 -2px 6px rgba(0,0,0,.04);}
  .tab .hide-toggle{border:none;background:transparent;cursor:pointer;font-size:12px;line-height:1;padding:0 2px;border-radius:4px;opacity:.7;}
  .tab .hide-toggle:hover{opacity:1;background:#e4e7ec;}
  .tab.hidden-tab{opacity:.5;}
  .tab.hidden-tab .tname{text-decoration:line-through;}
  .tab.tab-virtual{background:#f3f0ff;color:#5b21b6;font-weight:700;}
  .tab.tab-virtual.active{background:var(--panel);color:#5b21b6;}
  .tab.tab-virtual .vt-ico{font-size:12px;}
  .tab.tab-dragging{opacity:.4;}
  .tab.tab-before{box-shadow:inset 3px 0 0 0 #4c6fff;}
  .tab.tab-after{box-shadow:inset -3px 0 0 0 #4c6fff;}
  .tab .tname{outline:none;}
  .tab .x{border:none;background:transparent;color:#98a2b3;cursor:pointer;border-radius:50%;width:20px;height:20px;font-size:14px;line-height:1;}
  .tab .x:hover{background:#e4e7ec;color:#d92d20;}
  .tab-add{border:none;background:transparent;color:var(--muted);font-size:22px;line-height:1;cursor:pointer;padding:4px 12px;border-radius:8px;align-self:center;}
  .tab-add:hover{background:#f5f7fa;color:var(--text);}

  /* ---------- Toolbar under tabs ---------- */
  .subbar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--panel);border-bottom:1px solid var(--border);}
  .subbar .squad-name{font-weight:800;font-size:15px;cursor:text;padding:3px 7px;border-radius:7px;outline:none;}
  .subbar .squad-name:hover{background:#f0f1f4;}
  .subbar .squad-name[contenteditable="true"]{background:#fff;box-shadow:0 0 0 2px #4c6fff;}
  .subbar .spacer{flex:1;}
  .btn{border:1px solid var(--border);background:#fff;color:var(--text);padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;}
  .btn:hover{background:#f5f7fa;}
  .btn.primary{background:#4c6fff;border-color:#4c6fff;color:#fff;}
  .btn.primary:hover{background:#3a5cf0;}
  .btn.danger{color:#d92d20;border-color:#fecdca;background:#fff;margin-right:auto;}
  .btn.danger:hover{background:#fef3f2;border-color:#f97066;}
  .zoom{display:flex;align-items:center;gap:4px;}
  .zoom button{width:28px;height:28px;border:1px solid var(--border);background:#fff;border-radius:6px;cursor:pointer;font-size:15px;}
  .zoom button:hover{background:#f5f7fa;}

  /* ---------- Gantt area ---------- */
  .gantt{flex:1;overflow:auto;position:relative;background:var(--panel);}
  .grid{position:relative;min-width:max-content;}
  .row{display:flex;height:var(--row-h);border-bottom:1px solid #f0f1f4;position:relative;}
  .row.project{background:#fafbfc;}
  .row.project .left{font-weight:800;}
  .row.phase{height:auto;min-height:var(--row-h);}
  .row.phase .left{font-weight:600;padding-top:11px;padding-bottom:11px;padding-left:6px;}
  .row.task{height:32px;}
  .row.task .left{font-weight:500;color:#475467;}
  .row.task .left .label{font-size:12px;}
  .row.task .bar{top:7px;height:18px;font-size:10.5px;border-radius:6px;}
  .row.task .bar .fill{border-radius:6px 0 0 6px;}
  /* dashed connector thread (project -> its dev work), Facebook-comment style */
  .tree{position:absolute;left:34px;top:0;bottom:0;width:48px;pointer-events:none;z-index:1;}
  .tree .v{position:absolute;left:0;top:0;bottom:0;border-left:2px dashed #ccd2dc;}
  .tree.last .v{bottom:50%;}
  .tree .h{position:absolute;left:0;width:46px;top:calc(50% - 1px);border-top:2px dashed #ccd2dc;border-bottom-left-radius:8px;}
  /* timeline connector thread (in the track), rooted at the project's start column */
  .tl-v{position:absolute;top:0;bottom:0;width:0;border-left:2px dashed #c4cad4;z-index:1;pointer-events:none;}
  .tl-v.last{bottom:calc(50% - 1px);}
  .tl-h{position:absolute;top:calc(50% - 1px);height:0;border-top:2px dashed #c4cad4;z-index:1;pointer-events:none;}
  /* phase row drag-and-drop (move between projects / reorder) */
  .row.phase .left.drag-src{cursor:grab;}
  .row.phase .left.drag-src:active{cursor:grabbing;}
  .row.row-dragging{opacity:.4;}
  .row.drop-into .left{box-shadow:inset 0 0 0 2px #4c6fff;border-radius:6px;}
  .row.drop-before .left{box-shadow:inset 0 3px 0 0 #4c6fff;}
  /* category reorder */
  .row.project .left.drag-src{cursor:grab;}
  .row.project .left.drag-src:active{cursor:grabbing;}
  .row.cat-dragging{opacity:.4;}
  .row.cat-before{box-shadow:inset 0 3px 0 0 #4c6fff;}
  .row.cat-after{box-shadow:inset 0 -3px 0 0 #4c6fff;}

  .left{position:sticky;left:0;z-index:8;width:var(--left-w);min-width:var(--left-w);
        display:flex;align-items:center;gap:8px;padding:0 16px;background:inherit;border-right:1px solid var(--border);}
  .row.project .left{padding-left:18px;}
  .row.project .left{background:#fafbfc;}
  .row.phase .left,.row.task .left{background:#fff;}
  .left .caret{width:16px;text-align:center;cursor:pointer;color:#98a2b3;font-size:11px;user-select:none;flex:none;}
  .left .caret.hidden{visibility:hidden;}
  .left .dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .left .label{flex:1;font-size:13px;line-height:1.2;overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;line-clamp:2;word-break:break-word;}
  .tagchip{flex:none;font-size:10px;font-weight:700;color:#5b21b6;background:#ede9fe;border:1px solid #ddd6fe;border-radius:999px;padding:1px 7px;white-space:nowrap;}
  .namecol{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;align-items:flex-start;}
  .namecol .label{flex:0 0 auto;margin-bottom:3px;}
  .namecol .tag-line{align-self:flex-start;}
  .links-line{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
  .size-line{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
  .size-chip{font-size:10px;font-weight:700;border-radius:999px;padding:1px 8px;white-space:nowrap;border:1px solid transparent;}
  .size-chip.s-Small{color:#3f6212;background:#ecfccb;border-color:#d9f99d;}
  .size-chip.s-Medium{color:#854d0e;background:#fef9c3;border-color:#fde68a;}
  .size-chip.s-Big{color:#9a3412;background:#ffedd5;border-color:#fed7aa;}
  .size-chip.s-Huge{color:#991b1b;background:#fee2e2;border-color:#fecaca;}
  .ll-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  .tag-line{display:inline-flex;align-items:center;gap:5px;flex-wrap:wrap;}
  .tag-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  .tag-picker{display:flex;flex-wrap:wrap;gap:6px;}
  .tagpick{font-size:12px;font-weight:600;border-radius:999px;padding:4px 10px;cursor:pointer;border:1px solid var(--border);white-space:nowrap;}
  .tagpick.add{background:#fff;color:var(--muted);border-style:dashed;}
  .tagpick.add:hover{color:var(--text);border-color:#98a2b3;}
  .tagpick.sel b{font-weight:800;opacity:.7;}
  .tagfilter-wrap{position:relative;display:flex;align-items:center;gap:6px;}
  .tagfilter{border:1px solid var(--border);background:#fff;border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;color:var(--text);}
  .tagfilter:hover{background:#f5f7fa;}
  .tagfilter.active-filter{border-color:#4c6fff;color:#4c6fff;}
  .tagfilter-menu{position:absolute;top:calc(100% + 6px);left:34px;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 14px 34px rgba(16,24,40,.18);padding:8px;z-index:55;min-width:180px;max-height:320px;overflow-y:auto;}
  .tagfilter-menu .tf-row{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:7px;cursor:pointer;font-size:13px;}
  .tagfilter-menu .tf-row:hover{background:#f5f7fa;}
  .tagfilter-menu .tf-row input{width:16px;height:16px;cursor:pointer;}
  .tagfilter-menu .tf-clear{width:100%;margin-top:6px;border:none;background:#f0f1f4;border-radius:7px;padding:7px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;}
  .tagfilter-menu .tf-clear:hover{color:var(--text);}
  .tagfilter-menu .tf-empty{font-size:12px;color:var(--muted);padding:6px;}
  .searchbox{border:1px solid var(--border);background:#fff;border-radius:8px;padding:7px 12px;font-size:13px;font-family:inherit;width:220px;margin-left:10px;}
  .searchbox:focus{outline:none;border-color:#4c6fff;box-shadow:0 0 0 2px rgba(76,111,255,.15);}
  mark{background:#fde68a;color:inherit;border-radius:2px;padding:0 1px;}
  /* view settings menu */
  .settings-wrap{position:relative;}
  .settings-btn{display:flex;align-items:center;gap:7px;border:1px solid var(--border);background:#fff;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);}
  .settings-btn:hover{background:#f5f7fa;}
  .settings-menu{position:absolute;right:0;top:calc(100% + 8px);background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 18px 44px rgba(16,24,40,.2);padding:6px 16px 16px;z-index:50;width:288px;}
  .settings-menu .sm-title{font-size:15px;font-weight:800;color:var(--text);padding:12px 0 4px;}
  .settings-menu .sm-sec{padding:14px 0;border-top:1px solid #eef0f3;}
  .settings-menu .sm-label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;}
  .settings-menu .sm-btns{display:flex;gap:8px;}
  .settings-menu .sm-act{flex:1;border:1px solid var(--border);background:#fff;border-radius:9px;padding:9px 8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text);}
  .settings-menu .sm-act:hover{background:#f5f7fa;border-color:#d0d5dd;}
  .settings-menu .sm-zoom{display:flex;align-items:center;gap:8px;}
  .settings-menu .sm-zoom button{width:36px;height:36px;border:1px solid var(--border);background:#fff;border-radius:9px;font-size:17px;cursor:pointer;color:var(--text);}
  .settings-menu .sm-zoom button:hover{background:#f5f7fa;}
  .settings-menu .sm-zoom #zoomVal{min-width:56px;text-align:center;font-weight:800;font-size:15px;}
  .settings-menu .sm-zoom .sm-reset{width:auto;padding:0 12px;height:36px;font-size:12px;font-weight:700;color:var(--muted);margin-left:auto;}
  .settings-menu .sm-switch{display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;}
  .settings-menu .sm-switch input{position:absolute;opacity:0;pointer-events:none;}
  .settings-menu .sm-switch .track{flex:none;width:40px;height:23px;border-radius:999px;background:#d0d5dd;position:relative;transition:background .15s;}
  .settings-menu .sm-switch .track::after{content:'';position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(16,24,40,.25);transition:transform .15s;}
  .settings-menu .sm-switch input:checked + .track{background:#4c6fff;}
  .settings-menu .sm-switch input:checked + .track::after{transform:translateX(17px);}
  .left .acts{display:none;gap:2px;flex:none;}
  .left:hover .acts{display:flex;}
  .left:hover .priochip{display:none;}   /* hide priority on hover to make room for the action icons */
  .left .acts button{border:none;background:transparent;cursor:pointer;font-size:12px;color:#98a2b3;width:22px;height:22px;border-radius:5px;}
  .left .acts button:hover{background:#eef0f3;color:var(--text);}
  .indent{flex:none;}

  .track{position:relative;flex:1;min-width:0;}
  /* column separators painted via background of header cells; track gridlines: */
  .gridlines{position:absolute;inset:0;z-index:0;pointer-events:none;}
  .gridlines .col{position:absolute;top:0;bottom:0;border-left:1px solid #eef0f3;}
  .gridlines .subcol{position:absolute;top:0;bottom:0;border-left:1px solid #f5f6f8;}

  /* header */
  .head{position:sticky;top:0;z-index:10;display:flex;height:var(--head-h);background:var(--panel);}
  .head .left{z-index:13;font-weight:800;font-size:12px;color:var(--muted);background:var(--panel);letter-spacing:.4px;text-transform:uppercase;}
  .hdr-add{margin-left:auto;flex:none;width:24px;height:24px;border:1px solid var(--border);background:#fff;color:#4c6fff;border-radius:7px;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;}
  .hdr-add:hover{background:#4c6fff;color:#fff;border-color:#4c6fff;}
  .head .track{display:flex;}
  .headcell{position:absolute;top:0;height:var(--head-h);
            display:flex;align-items:center;gap:5px;padding-left:14px;font-size:15px;font-weight:800;color:#fff;letter-spacing:.3px;}
  .headcell small{font-weight:600;opacity:.7;font-size:12px;}
  /* week view two-tier header */
  .head.week{height:80px;}
  .monthband{position:absolute;top:22px;height:26px;display:flex;align-items:center;padding-left:10px;font-size:13px;font-weight:800;color:#fff;letter-spacing:.3px;border-right:1px solid rgba(255,255,255,.15);}
  .daycell{position:absolute;top:48px;height:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;border-left:1px solid #eef0f3;font-size:11px;color:#475467;}
  /* quarter view: year band + quarter cells */
  .head.quarter{height:60px;}
  .q-cell{position:absolute;top:22px;height:38px;display:flex;align-items:center;gap:5px;padding-left:14px;font-size:15px;font-weight:800;color:#fff;letter-spacing:.3px;}
  .daycell .dnum{font-weight:700;line-height:1.1;}
  .daycell .ddow{font-size:9px;color:#98a2b3;line-height:1.1;}
  .daycell.weekend{background:#f4f5f7;}
  .daycell.istoday{background:#fee4e2;}
  .daycell.istoday .dnum{color:#d92d20;}
  /* month view three-tier header */
  .head.month{height:74px;}
  .m-year{position:absolute;top:0;height:22px;display:flex;align-items:center;padding-left:12px;font-size:12px;font-weight:800;color:#344054;background:#f0f1f4;border-right:1px solid #fff;letter-spacing:.3px;}
  .m-month{position:absolute;top:22px;height:28px;display:flex;align-items:center;padding-left:12px;font-size:14px;font-weight:800;color:#fff;letter-spacing:.3px;border-right:1px solid rgba(255,255,255,.15);}
  .m-week{position:absolute;top:50px;height:24px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#98a2b3;border-left:1px solid #eef0f3;}

  /* bars */
  .bar{position:absolute;top:calc(50% - 16px);height:32px;border-radius:9px;cursor:grab;
       display:flex;align-items:center;justify-content:flex-start;gap:6px;padding:0 10px;font-size:10.5px;font-weight:600;overflow:hidden;
       user-select:none;transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;transform-origin:center;}
  /* hover pop — makes the focused project stand out on a shared screen */
  .bar:hover:not(.summary):not(.dragging){transform:scale(1.06);box-shadow:0 8px 22px rgba(16,24,40,.28);filter:brightness(1.03);z-index:30;overflow:visible;}
  .bar.dragging{cursor:grabbing;opacity:.9;z-index:20;box-shadow:0 6px 16px rgba(16,24,40,.22);}
  .bar.wip{background:transparent!important;border:1.5px dashed currentColor;font-weight:700;}
  .bar.wip .fill{display:none;}
  .bar .barlabel{position:relative;z-index:2;overflow:hidden;text-align:left;line-height:1.25;
       display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;line-clamp:2;word-break:break-word;}
  .row.task .bar .barlabel{-webkit-line-clamp:1;line-clamp:1;white-space:nowrap;text-overflow:ellipsis;}
  .bar .fill{position:absolute;left:0;top:0;bottom:0;border-radius:9px 0 0 9px;z-index:1;}
  .bar .badge{position:relative;z-index:2;background:#101828;color:#fff;font-size:9.5px;font-weight:800;
       padding:2px 6px;border-radius:5px;letter-spacing:.3px;flex:none;}
  .bar .handle{position:absolute;top:0;bottom:0;width:8px;cursor:ew-resize;z-index:3;}
  .bar .handle.l{left:0;}
  .bar .handle.r{right:0;}
  .bar.summary{cursor:default;opacity:.5;height:5px;top:calc(50% - 2.5px);box-shadow:none;border-radius:3px;}
  /* design shown as one lighter bar merged with the project bar (spans the design date range),
     with start/end ticks and a "Design" label so the design window reads on the same axis */
  .design-span{position:absolute;top:calc(50% - 16px);height:32px;border-radius:9px;z-index:0;cursor:pointer;}
  .design-tick{position:absolute;top:calc(50% - 23px);height:46px;width:2px;border-radius:1px;z-index:6;pointer-events:none;}
  .design-cap{position:absolute;top:calc(50% - 33px);font-size:9px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;cursor:pointer;z-index:6;padding-left:3px;}
  .design-cap.r{padding-left:0;padding-right:3px;transform:translateX(-100%);}   /* right edge sits on the end tick */
  .row.phase.has-design{min-height:80px;}

  .today{position:absolute;top:0;bottom:0;width:0;border-left:2px dashed #f04438;z-index:7;pointer-events:none;transform:translateX(-1px);}
  /* Today marker (dot + label) pinned at the top of the timeline */
  .today-mark{position:absolute;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:2px;z-index:11;pointer-events:none;}
  .today-mark .dot{width:9px;height:9px;border-radius:50%;background:#f04438;}
  .today-mark .lbl{font-size:11px;font-weight:800;color:#fff;white-space:nowrap;background:#f04438;padding:1px 7px;border-radius:6px;}

  .empty{padding:40px;text-align:center;color:var(--muted);}
  /* Marketing list view */
  .listview{padding:16px 20px 40px;max-width:900px;}
  .lv-group{margin-bottom:22px;}
  .lv-head{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;color:var(--text);padding:0 4px 8px;border-bottom:2px solid var(--border);margin-bottom:6px;}

function applyDesignDates(proj, startIso, endIso){
  if(!validISO(endIso)) return false;   // need a valid end (the ETA)
  const start = validISO(startIso) ? startIso : '';
  if(!Array.isArray(proj.tasks)) proj.tasks=[];
  const d = proj.tasks.find(t=>t.type==='design');
  if(d){
    let changed=false;
    if(d.end!==endIso){ d.end=endIso; changed=true; }
    if(start && d.start!==start){ d.start=start; changed=true; }   // don't wipe a manual start when Jira gives no start
    return changed;
  }
  proj.tasks.push({id:uid(), type:'design', start, end:endIso, progress:0, customName:'', note:'', blockers:[]});
  return true;
}

    if(r.status===401){ handleAuthExpired(); return; }

      adoptRemoteData(migrate(rec.state), rec.updatedAt);
      setSync('Updated by ' + (rec.updatedBy||'teammate'), 'ok');
    }
  }catch(e){ /* offline: keep working locally */ }
}

/* ============================ Timeline math ============================ */
function gatherDates(squad){
  const ds=[];
  const add=s=>{ if(validISO(s)) ds.push(parse(s)); };   // only real dates -> never NaN in min/max
  squad.projects.forEach(cat=>cat.phases.forEach(proj=>{
    add(proj.start); add(proj.end);
    (proj.tasks||[]).forEach(t=>{ add(t.start); add(t.end); });
  }));
  return ds;
}
function quarterStart(d){return new Date(d.getFullYear(),Math.floor(d.getMonth()/3)*3,1);}
function buildUnits(squad){
  const ds=gatherDates(squad);
  let min,max;
  if(ds.length){min=new Date(Math.min(...ds));max=new Date(Math.max(...ds));}
  else{min=new Date();max=addMonths(new Date(),3);}
  if(isNaN(min.getTime())||isNaN(max.getTime())){ min=new Date(); max=addMonths(new Date(),3); }   // safety: never NaN
  const today=new Date(); if(today<min)min=today; if(today>max)max=today;

  const view=curView();
  const base = view==='quarter'?200 : view==='month'?200 : 46;   // wider defaults so it reads without zooming
  // pass 1: build the unit list (no widths yet)
  const units=[];
  let guard=6000;   // hard cap so a pathological range can never hang the loop
  if(view==='quarter'){
    let cur=quarterStart(min);const end=quarterStart(max);
    while(cur<=end && guard-->0){ const next=addMonths(cur,3); const q=Math.floor(cur.getMonth()/3)+1;
      units.push({start:cur,end:next,label:'Q'+q,sub:String(cur.getFullYear())}); cur=next; }
  }else if(view==='month'){
    let cur=new Date(min.getFullYear(),min.getMonth(),1);const end=new Date(max.getFullYear(),max.getMonth(),1);
    while(cur<=end && guard-->0){ const next=addMonths(cur,1);
      units.push({start:cur,end:next,label:MONTHS[cur.getMonth()],sub:"'"+String(cur.getFullYear()).slice(2)}); cur=next; }
  }else{ // week = day-level columns
    let cur=new Date(min.getFullYear(),min.getMonth(),min.getDate());
    let end=new Date(max.getFullYear(),max.getMonth(),max.getDate());
    while(cur.getDay()!==1) cur=addDays(cur,-1);   // snap start back to Monday
    while(end.getDay()!==0) end=addDays(end,1);     // snap end forward to Sunday
    while(cur<=end && guard-->0){ const next=addDays(cur,1);
      units.push({start:cur,end:next,day:cur.getDate(),dow:cur.getDay()}); cur=next; }
  }
  // pass 2: size columns — stretch to fill the viewport when the range is short
  let w = base*curZoom();
  const avail = availTrackWidth();
  if(units.length && avail>0){ const fit=(avail-LEFTPAD)/units.length; if(fit>w) w=fit; }
  let x=LEFTPAD;   // left gutter for the connector thread
  units.forEach(u=>{ u.x=x; u.width=w; x+=w; });
  return units;
}
// visible width available for the timeline track (viewport minus the sticky left panel)
function availTrackWidth(){
  const g=document.getElementById('gantt');
  if(!g) return 0;
  const leftW=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--left-w'))||328;
  return Math.max(0, g.clientWidth - leftW - 1);
}
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW=['S','M','T','W','T','F','S'];   // index by getDay() (0=Sun)
function totalWidth(units){return units.length?units[units.length-1].x+units[units.length-1].width:0;}
function dateToX(d,units){
  if(!units.length)return 0;
  if(d<=units[0].start)return units[0].x;
  const last=units[units.length-1];
  if(d>=last.end)return last.x+last.width;
  for(const u of units){
    if(d>=u.start&&d<u.end) return u.x+(d-u.start)/(u.end-u.start)*u.width;
  }
  return units[0].x;
}
function xToDate(x,units){
  if(!units.length)return new Date();
  for(const u of units){
    if(x>=u.x&&x<=u.x+u.width){
      const frac=(x-u.x)/u.width;
      const ms=u.start.getTime()+frac*(u.end-u.start);
      const d=new Date(ms); return new Date(d.getFullYear(),d.getMonth(),d.getDate());
    }
  }
  const last=units[units.length-1];
  return x<0?units[0].start:last.end;
}

/* ============================ Color helper ============================ */
function rgba(hex,a){const h=hex.replace('#','');const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return `rgba(${r},${g},${b},${a})`;}
// gradient quarter header: dark navy -> light gray, like the Figma reference
function headShade(i,n){
  const t = n<=1?0:i/(n-1);
  const dark=[26,34,51], light=[197,202,212];   // #1a2233 -> #c5cad4
  const r=Math.round(dark[0]+(light[0]-dark[0])*t);
  const g=Math.round(dark[1]+(light[1]-dark[1])*t);
  const b=Math.round(dark[2]+(light[2]-dark[2])*t);
  const lum=(0.299*r+0.587*g+0.114*b);
  return {bg:`rgb(${r},${g},${b})`, fg: lum>150?'#101828':'#ffffff'};
}

function renderTagFilter(){
  const btn=document.getElementById('tagFilterBtn'), menu=document.getElementById('tagFilterMenu'); if(!btn)return;
  const used=new Set();
  const av=activeVirtual();
  if(av&&av.listByEnd){ allProjects().forEach(x=>(x.p.tags||[]).forEach(t=>used.add(t))); }
  else activeSquad().projects.forEach(cat=>cat.phases.forEach(pr=>(pr.tags||[]).forEach(t=>used.add(t))));
  const tags=[...new Set([...PREDEFINED_TAGS.filter(t=>used.has(t)), ...[...used].filter(t=>!PREDEFINED_TAGS.includes(t))])];
  if(!Array.isArray(state.tagFilters)) state.tagFilters=[];
  state.tagFilters=state.tagFilters.filter(t=>used.has(t));   // drop filters for tags no longer present
  const n=state.tagFilters.length;

  tags.forEach(t=>{

function reorderSquads(dragId,targetId,after){
  const arr=activeTribe().squads;
  const from=arr.findIndex(s=>s.id===dragId);
  if(from<0){clearTabMarks();return;}
  const [moved]=arr.splice(from,1);
  let to=arr.findIndex(s=>s.id===targetId);
  if(to<0) to=arr.length; else if(after) to+=1;
  arr.splice(to,0,moved);
  clearTabMarks();
  render();
}

      render();

    tab.draggable=true;

    tab.addEventListener('dragend',clearTabMarks);

      tab.classList.add(e.clientX > r.left+r.width/2 ? 'tab-after' : 'tab-before');

function makeBar(color,label,progress,onEdit,opts){
  opts=opts||{};
  const bar=document.createElement('div'); bar.className='bar'+(opts.wip?' wip':'');
  if(opts.wip){ bar.style.color=mix(color,0.55); }
  else if(progress===null){
    // project bar: Miro-style solid pastel fill + darker matching-hue text
    bar.style.background= color;
    bar.style.color = mix(color,0.62);
    bar.style.boxShadow = '0 1px 2px rgba(16,24,40,.12)';
  } else {
    // dev-work bar: solid translucent fill with a progress fill
    bar.style.background= rgba(color,.28);
    bar.style.color = '#1d2433';
    const fill=document.createElement('div'); fill.className='fill'; fill.style.width=Math.min(100,progress)+'%'; fill.style.background=rgba(color,.85);
    bar.appendChild(fill);
  }
  const span=document.createElement('span'); span.className='barlabel'; span.textContent=label; bar.appendChild(span);
  if(opts.badge){const bg=document.createElement('span');bg.className='badge';bg.textContent=opts.badge;bar.appendChild(bg);}
  const hl=document.createElement('div'); hl.className='handle l'; const hr=document.createElement('div'); hr.className='handle r';
  bar.appendChild(hl); bar.appendChild(hr);
  bar._onEdit=onEdit;
  return bar;
}
function mix(hex,t){const h=hex.replace('#','');let r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);r=Math.round(r*(1-t));g=Math.round(g*(1-t));b=Math.round(b*(1-t));return `rgb(${r},${g},${b})`;}
// Effective dates: blank start -> first date in view; blank end -> last date in view.
function effStart(obj,units,fb){ return obj.start ? parse(obj.start) : (fb || (units.length?units[0].start:new Date())); }
function effEnd(obj,units){ return obj.end ? parse(obj.end) : (units.length?addDays(units[units.length-1].end,-1):new Date()); }
// Where a work item (dev/design) starts when it has no start date:
//   - has its own start          -> that date
//   - ends on/after project start -> the project's start date
//   - ends before project start   -> the 1st of the work's end-date month
function workStartFallback(t,projStart){
  if(t && t.end && parse(t.end)<projStart) return addMonths(parse(t.end),0);
  return projStart;
}
function placeBar(bar,obj,units,fb){
  const x=dateToX(effStart(obj,units,fb),units);
  const w=Math.max(dateToX(addDays(effEnd(obj,units),1),units)-x, 6);
  bar.style.left=x+'px'; bar.style.width=w+'px';
}

/* ---------- Drag move / resize ---------- */
function attachDrag(bar,obj,units,kind,parent,fb){
  let mode=null,startX=0,moved=false,origStart,origEnd;
  function down(e,m){
    e.preventDefault(); e.stopPropagation();
    mode=m; startX=e.clientX; moved=false; busy=true;
    origStart=effStart(obj,units,fb); origEnd=effEnd(obj,units);
    bar.classList.add('dragging');
    window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
  }
  function dayDelta(dx){
    // approximate days per pixel from first unit
    const u=units[0]; const dpp=(u.end-u.start)/86400000/u.width;
    return Math.round(dx*dpp);
  }
  function move(e){
    const dx=e.clientX-startX; if(Math.abs(dx)>3)moved=true;
    const dd=dayDelta(dx);
    let ns=new Date(origStart), ne=new Date(origEnd);
    if(mode==='move'){ns=addDays(origStart,dd);ne=addDays(origEnd,dd); obj.start=fmt(ns); obj.end=fmt(ne);}
    if(mode==='l'){ns=addDays(origStart,dd); if(ns>=ne)ns=addDays(ne,-1); obj.start=fmt(ns);}
    if(mode==='r'){ne=addDays(origEnd,dd); if(ne<=ns)ne=addDays(ns,1); obj.end=fmt(ne);}
    placeBar(bar,obj,units);
  }
  function up(){
    bar.classList.remove('dragging');
    window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',up);
    if(moved){ if(kind==='phase')clampPhase(parent,obj); render(); }
    else { bar._onEdit&&bar._onEdit(); }
    mode=null; busy=false;
  }
  bar.addEventListener('mousedown',e=>down(e,'move'));
  bar.querySelector('.handle.l').addEventListener('mousedown',e=>down(e,'l'));
  bar.querySelector('.handle.r').addEventListener('mousedown',e=>down(e,'r'));
}
function clampPhase(){/* hook for future auto-expand of phase to fit tasks */}

/* ---------- Drag a phase row between projects / reorder ---------- */
function clearDropMarks(){
  document.querySelectorAll('.drop-into,.drop-before,.row-dragging')
    .forEach(el=>el.classList.remove('drop-into','drop-before','row-dragging'));
}
function wireDropTarget(row,projectId,beforePhaseId){
  row.addEventListener('dragover',e=>{
    if(!dragPhase)return;
    e.preventDefault(); e.dataTransfer.dropEffect='move';
    clearDropMarks();
    row.classList.add(beforePhaseId ? 'drop-before' : 'drop-into');
  });
  row.addEventListener('drop',e=>{
    if(!dragPhase)return;
    e.preventDefault();
    movePhase(dragPhase, projectId, beforePhaseId);
  });
}
function makePhaseDraggable(left,row,projectId,phaseId){
  left.setAttribute('draggable','true');
  left.classList.add('drag-src');
  left.addEventListener('dragstart',e=>{
    dragPhase={projectId,phaseId};
    e.dataTransfer.effectAllowed='move';
    try{e.dataTransfer.setData('text/plain',phaseId);}catch(_){}
    row.classList.add('row-dragging');
  });
  left.addEventListener('dragend',()=>{ dragPhase=null; clearDropMarks(); });
}
function movePhase(src,destProjectId,beforePhaseId){
  const squad=activeSquad();
  const srcProj=squad.projects.find(x=>x.id===src.projectId);
  const destProj=squad.projects.find(x=>x.id===destProjectId);
  if(!srcProj||!destProj){ dragPhase=null; clearDropMarks(); return; }
  const idx=srcProj.phases.findIndex(x=>x.id===src.phaseId);
  if(idx<0){ dragPhase=null; clearDropMarks(); return; }
  const [phase]=srcProj.phases.splice(idx,1);
  if(beforePhaseId && beforePhaseId!==phase.id){
    const bidx=destProj.phases.findIndex(x=>x.id===beforePhaseId);
    destProj.phases.splice(bidx<0?destProj.phases.length:bidx,0,phase);
  } else {
    destProj.phases.push(phase);
  }
  dragPhase=null; clearDropMarks(); render();
}

/* ---------- Drag a whole category to reorder (its projects move with it) ---------- */
function clearCatMarks(){
  document.querySelectorAll('.cat-before,.cat-after,.cat-dragging')
    .forEach(el=>el.classList.remove('cat-before','cat-after','cat-dragging'));
}
function makeCatDraggable(left,row,catId){
  left.setAttribute('draggable','true');
  left.classList.add('drag-src');
  left.addEventListener('dragstart',e=>{
    dragCat=catId;
    e.dataTransfer.effectAllowed='move';
    try{e.dataTransfer.setData('text/plain',catId);}catch(_){}
    row.classList.add('cat-dragging');
  });
  left.addEventListener('dragend',()=>{ dragCat=null; clearCatMarks(); });
}
function wireCatDrop(row,catId){
  row.addEventListener('dragover',e=>{
    if(!dragCat || dragCat===catId) return;
    e.preventDefault(); e.dataTransfer.dropEffect='move';
    clearCatMarks();
    const r=row.getBoundingClientRect();
    row.classList.add(e.clientY > r.top+r.height/2 ? 'cat-after' : 'cat-before');
  });
  row.addEventListener('drop',e=>{
    if(!dragCat || dragCat===catId) return;
    e.preventDefault();
    const r=row.getBoundingClientRect();
    reorderCategories(dragCat, catId, e.clientY > r.top+r.height/2);
  });
}
function reorderCategories(dragId,targetId,after){
  const arr=activeSquad().projects;
  const from=arr.findIndex(c=>c.id===dragId);
  if(from<0){ dragCat=null; clearCatMarks(); return; }
  const [moved]=arr.splice(from,1);
  let to=arr.findIndex(c=>c.id===targetId);
  if(to<0) to=arr.length; else if(after) to+=1;
  arr.splice(to,0,moved);
  dragCat=null; clearCatMarks(); render();
}

const modalBg=document.getElementById('modalBg'), modal=document.getElementById('modal');
function hideNoteDock(){
  const d=document.getElementById('noteDock'), p=document.getElementById('notePanel');
  if(d)d.style.display='none'; if(p)p.style.display='none';
}
// Floating note button + side popup; auto-expanded if a note exists. Read value from #m_note on save.
function wireNoteDock(initialNote){
  const noteDock=document.getElementById('noteDock'), noteBtn=document.getElementById('noteFab'), notePanel=document.getElementById('notePanel'), noteTa=document.getElementById('m_note');
  noteBtn.innerHTML=NOTE_ICON; noteDock.style.display='flex';
  noteTa.value=initialNote||'';
  let open = !!(initialNote && initialNote.trim());
  function sync(){ notePanel.style.display=open?'flex':'none'; noteBtn.classList.toggle('open',open); noteBtn.classList.toggle('has',noteTa.value.trim()!==''); }
  sync();
  noteBtn.onclick=()=>{ open=!open; sync(); if(open) noteTa.focus(); };
  noteTa.oninput=()=>noteBtn.classList.toggle('has',noteTa.value.trim()!=='');
}
function closeModal(){modalBg.classList.remove('open');modal.innerHTML='';hideNoteDock();}
// Date input with a clear (×) button. Wire with wireDateClears() after innerHTML is set.
function dateField(id,val){
  return `<div class="datewrap"><input type="date" id="${id}" value="${val||''}"><button type="button" class="dateclear" data-for="${id}" title="Clear date">×</button></div>`;
}
function wireDateClears(){
  modal.querySelectorAll('.dateclear').forEach(b=>{
    const inp=modal.querySelector('#'+b.dataset.for);
    const sync=()=>{ b.style.display = inp.value ? 'flex' : 'none'; };
    sync();
    inp.addEventListener('input',sync);
    b.onclick=()=>{ inp.value=''; sync(); inp.focus(); };
  });
}
modalBg.onclick=e=>{if(e.target===modalBg)closeModal();};
document.addEventListener('keydown',e=>{ if(e.key==='Escape' && modalBg.classList.contains('open')) closeModal(); });

function openProjectModal(p){
  hideNoteDock();
  const editing=!!p;
  let color = editing ? (p.color||PALETTE[0]) : PALETTE[activeSquad().projects.length%PALETTE.length];
  modal.innerHTML=`<h3>${editing?'Edit':'New'} Category</h3>
    <div class="field"><label>Name</label><input id="m_name" value="${editing?esc(p.name):''}" placeholder="Category name"></div>
    <div class="field"><label>Color (shared by all projects in this category)</label><div class="swatches" id="m_sw"></div></div>
    <div class="modal-actions"><button class="btn" id="m_cancel">Cancel</button><button class="btn primary" id="m_save">Save</button></div>`;
  const sw=modal.querySelector('#m_sw');
  PALETTE.forEach(c=>{const d=document.createElement('div');d.className='swatch'+(c===color?' sel':'');d.style.background=c;d.onclick=()=>{color=c;sw.querySelectorAll('.swatch').forEach(s=>s.classList.remove('sel'));d.classList.add('sel');};sw.appendChild(d);});
  modalBg.classList.add('open'); modal.querySelector('#m_name').focus();
  modal.querySelector('#m_cancel').onclick=closeModal;
  modal.querySelector('#m_save').onclick=()=>{
    const name=modal.querySelector('#m_name').value.trim()||'New Category';
    if(editing){ p.name=name; p.color=color; }
    else activeSquad().projects.push({id:uid(),name,color,phases:[]});
    closeModal();render();
  };
}

// Project modal: name + start + optional end (a single bar on the timeline).
function openPhaseModal(category,proj){
  const editing=!!proj;
  const def=proj||{name:'',start:'',end:'',tags:[],size:'',promo:'',priority:'',jira:'',docs:[],note:''};
  const tags=(def.tags||[]).slice();
  modal.innerHTML=`<h3>${editing?'Edit':'New'} Project</h3>
    <div class="field"><label>Project Name</label><input id="m_pname" value="${editing?esc(proj.name):''}" placeholder="e.g. Mobile App"></div>
    <div class="field row2">
      <div><label>Start (optional)</label>${dateField('m_start',def.start)}</div>
      <div><label>End (optional)</label>${dateField('m_end',def.end)}</div>
    </div>
    <div class="field" style="margin-top:-6px;"><span style="font-size:11px;color:var(--muted);">Leave a date blank to extend to the edge of the current view.</span></div>
    <div class="field"><label>Tags (optional — select multiple)</label>
      <div id="m_tags" class="tag-picker"></div>
      <div class="addrow" style="margin-top:6px;"><input id="m_tagnew" placeholder="Add custom tag…"><button type="button" class="btn" id="m_tagadd">Add</button></div>
    </div>
    <div class="field"><label>Priority (optional)</label><select id="m_priority">
      <option value="" ${!def.priority?'selected':''}>— None —</option>
      ${PRIORITIES.map(p=>`<option value="${p}" ${def.priority===p?'selected':''}>${p}</option>`).join('')}
    </select></div>
    <div class="field row2">
      <div><label>Feature size (optional)</label><select id="m_size">
        <option value="" ${!def.size?'selected':''}>— None —</option>
        ${FEATURE_SIZES.map(s=>`<option value="${s}" ${def.size===s?'selected':''}>${s}</option>`).join('')}
      </select></div>
      <div><label>Promotion (optional)</label><select id="m_promo">
        <option value="" ${!def.promo?'selected':''}>— None —</option>
        <option value="Yes" ${def.promo==='Yes'?'selected':''}>Yes</option>
        <option value="No" ${def.promo==='No'?'selected':''}>No</option>
      </select></div>
    </div>
    <div class="field"><label>Jira link (optional)</label><input id="m_jira" value="${esc(def.jira||'')}" placeholder="https://…"></div>
    <div class="field"><label>Documentation (optional)</label>
      <div id="m_docs" class="doclist"></div>
      <button type="button" class="btn" id="m_adddoc" style="width:100%;">＋ Add document link</button>
    </div>
    <div class="modal-actions"><button class="btn" id="m_cancel">Cancel</button><button class="btn primary" id="m_save">Save</button></div>`;
  wireDateClears();
  // multi-select tags
  const tagWrap=modal.querySelector('#m_tags');
  function renderTagPicker(){
    tagWrap.innerHTML='';
    tags.forEach((t,i)=>{ const c=tagColor(t); const chip=document.createElement('span'); chip.className='tagpick sel'; chip.style.cssText=`background:${c.bg};color:${c.fg};border-color:${c.bd}`; chip.innerHTML=esc(t)+' <b>×</b>'; chip.onclick=()=>{tags.splice(i,1);renderTagPicker();}; tagWrap.appendChild(chip); });
    const avail=[...new Set([...PREDEFINED_TAGS, ...allUsedTags()])].filter(p=>!tags.includes(p));
    avail.forEach(p=>{ const chip=document.createElement('span'); chip.className='tagpick add'; chip.textContent='+ '+p; chip.onclick=()=>{tags.push(p);renderTagPicker();}; tagWrap.appendChild(chip); });
  }
  renderTagPicker();
  const tagNew=modal.querySelector('#m_tagnew');
  function addCustomTag(){ const v=tagNew.value.trim(); if(v && !tags.includes(v)) tags.push(v); tagNew.value=''; renderTagPicker(); tagNew.focus(); }
  modal.querySelector('#m_tagadd').onclick=addCustomTag;
  tagNew.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault();addCustomTag();} };
  // documentation multi-link list
  const docs=(def.docs||[]).slice();
  const docWrap=modal.querySelector('#m_docs');
  function renderDocs(){
    docWrap.innerHTML='';
    docs.forEach((d,i)=>{
      const r=document.createElement('div'); r.className='doc-row';
      r.innerHTML=`<input class="doc-url" value="${esc(d)}" placeholder="https://…"><button type="button" class="doc-del" title="Remove">✕</button>`;
      r.querySelector('.doc-url').oninput=e=>docs[i]=e.target.value;
      r.querySelector('.doc-del').onclick=()=>{docs.splice(i,1);renderDocs();};
      docWrap.appendChild(r);
    });
  }
  renderDocs();
  modal.querySelector('#m_adddoc').onclick=()=>{docs.push('');renderDocs();};
  wireNoteDock(def.note);   // floating Note button + side popup
  modalBg.classList.add('open'); modal.querySelector('#m_pname').focus();
  modal.querySelector('#m_cancel').onclick=closeModal;
  modal.querySelector('#m_save').onclick=()=>{
    const name=modal.querySelector('#m_pname').value.trim()||'New Project';
    const start=modal.querySelector('#m_start').value, end=modal.querySelector('#m_end').value;
    if(start&&end&&end<start){alert('End date must be on or after start date.');return;}
    const tagList = tags.map(t=>t.trim()).filter(Boolean);
    const size = modal.querySelector('#m_size').value;
    const promo = modal.querySelector('#m_promo').value;
    const priority = modal.querySelector('#m_priority').value;
    const jira = normalizeUrl(modal.querySelector('#m_jira').value.trim());
    const docList = docs.map(d=>normalizeUrl(d.trim())).filter(Boolean);
    const note = document.getElementById('m_note').value.trim();
    if(editing){ proj.name=name; proj.start=start; proj.end=end; proj.tags=tagList; proj.size=size; proj.promo=promo; proj.priority=priority; proj.jira=jira; proj.docs=docList; proj.note=note; }
    else category.phases.push({id:uid(),name,start,end,tags:tagList,size,promo,priority,jira,docs:docList,note,tasks:[]});
    closeModal();render();
  };
}
function normalizeUrl(u){ if(!u)return ''; return /^https?:\/\//i.test(u)?u:'https://'+u; }
function linkIconsHTML(proj){
  let h='';
  if(proj.jira) h+=`<a class="lnk" href="${esc(proj.jira)}" target="_blank" rel="noopener" title="Open Jira" onclick="event.stopPropagation()">${JIRA_ICON}</a>`;
  (proj.docs||[]).forEach(d=>{ if(d) h+=`<a class="lnk" href="${esc(d)}" target="_blank" rel="noopener" title="${esc(d)}" onclick="event.stopPropagation()">${LINK_ICON}</a>`; });
  return h;
}
function priorityChipHTML(proj){
  return proj.priority?`<span class="priochip p-${proj.priority}" title="Priority: ${esc(proj.priority)}">${esc(proj.priority)}</span>`:'';
}
function indicatorsHTML(proj){

}

function openTaskModal(phase,t){
  const editing=!!t;
  const used=phase.tasks.map(x=>x.type);
  const def=t||{type:(TASK_TYPES.find(tt=>tt.key!=='custom'&&!used.includes(tt.key))||TASK_TYPES[0]).key,start:'',end:'',progress:0,customName:'',note:''};
  modal.innerHTML=`<h3>${editing?'Edit':'Add'} Development Work</h3>
    <div class="field"><label>Discipline</label><select id="m_type">${TASK_TYPES.map(tt=>`<option value="${tt.key}" ${tt.key===def.type?'selected':''}>${tt.label}</option>`).join('')}</select></div>
    <div class="field" id="m_namerow"><label>Work name</label><input id="m_cname" value="${esc(def.customName||'')}" placeholder="e.g. Data migration, Spike, Review"></div>
    <div class="field row2">
      <div><label>Start (optional)</label>${dateField('m_start',def.start)}</div>
      <div><label>End (optional)</label>${dateField('m_end',def.end)}</div>
    </div>
    <div class="field" style="margin-top:-6px;"><span style="font-size:11px;color:var(--muted);">Blank start → the project's start date (or the 1st of the end-date month if it ends before the project starts). Blank end → the edge of the current view.</span></div>
    <div class="field progress-row" id="m_prow"><label>Progress: <span id="m_pval">${def.progress||0}</span>%</label><input type="range" min="0" max="100" id="m_prog" value="${def.progress||0}"></div>
    <div class="field"><label>Blockers</label>
      <div id="m_blockers" class="checklist"></div>
      <div class="addrow"><input id="m_blkinput" placeholder="Add a blocker…"><button type="button" class="btn" id="m_blkadd">Add</button></div>
    </div>
    <div class="modal-actions">${editing?'<button class="btn danger" id="m_del">Delete work</button>':''}<button class="btn" id="m_cancel">Cancel</button><button class="btn primary" id="m_save">Save</button></div>`;
  const typeSel=modal.querySelector('#m_type'), prow=modal.querySelector('#m_prow'), namerow=modal.querySelector('#m_namerow');
  const prog=modal.querySelector('#m_prog'), pval=modal.querySelector('#m_pval');
  function syncType(){
    prow.style.display=TASK_MAP[typeSel.value].progress?'block':'none';
    namerow.style.display=typeSel.value==='custom'?'block':'none';
  }
  syncType(); typeSel.onchange=syncType;
  prog.oninput=()=>pval.textContent=prog.value;
  wireNoteDock(def.note);   // floating Note button + side popup
  // Blockers checklist (Jira-style): add items, check done, remove
  const blockers=(def.blockers||[]).map(b=>({id:b.id||uid(),text:b.text||'',done:!!b.done}));
  const blkWrap=modal.querySelector('#m_blockers');
  function renderBlockers(){
    blkWrap.innerHTML='';
    blockers.forEach((b,i)=>{
      const r=document.createElement('div'); r.className='chk-item'+(b.done?' done':'');
      r.innerHTML=`<input type="checkbox" ${b.done?'checked':''}><input class="txt" value="${esc(b.text)}" placeholder="Blocker…"><button type="button" class="del" title="Remove">✕</button>`;
      r.querySelector('input[type=checkbox]').onchange=e=>{b.done=e.target.checked;renderBlockers();};
      r.querySelector('.txt').oninput=e=>b.text=e.target.value;
      r.querySelector('.del').onclick=()=>{blockers.splice(i,1);renderBlockers();};
      blkWrap.appendChild(r);
    });
  }
  renderBlockers();
  const blkInput=modal.querySelector('#m_blkinput');
  function addBlk(){ const v=blkInput.value.trim(); if(!v)return; blockers.push({id:uid(),text:v,done:false}); blkInput.value=''; renderBlockers(); blkInput.focus(); }
  modal.querySelector('#m_blkadd').onclick=addBlk;
  blkInput.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault();addBlk();} };
  wireDateClears();
  modalBg.classList.add('open');
  modal.querySelector('#m_cancel').onclick=closeModal;
  if(editing){
    const label=t.type==='custom'?(t.customName||'this work'):(TASK_MAP[t.type]||TASK_MAP.custom).label+' work';
    modal.querySelector('#m_del').onclick=()=>{
      if(!confirm('Remove '+label+'?')) return;
      phase.tasks=phase.tasks.filter(x=>x!==t);
      closeModal(); render();
    };
  }
  modal.querySelector('#m_save').onclick=()=>{
    const type=typeSel.value;
    const customName=type==='custom'?modal.querySelector('#m_cname').value.trim():'';
    if(type==='custom' && !customName){alert('Please enter a name for the custom work.');return;}
    if(type!=='custom' && !editing && used.includes(type) && !confirm(TASK_MAP[type].label+' work already exists in this phase. Add another?'))return;
    const start=modal.querySelector('#m_start').value,end=modal.querySelector('#m_end').value;
    if(start&&end&&end<start){alert('End date must be on or after start date.');return;}
    const progress=TASK_MAP[type].progress?Number(prog.value):0;
    const note=document.getElementById('m_note').value.trim();
    const blk=blockers.filter(b=>b.text.trim()).map(b=>({id:b.id,text:b.text.trim(),done:b.done}));
    if(editing)Object.assign(t,{type,start,end,progress,customName,note,blockers:blk});
    else phase.tasks.push({id:uid(),type,start,end,progress,customName,note,blockers:blk});
    closeModal();render();
  };
}

/* ============================ Misc UI ============================ */
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function highlight(text,q){
  if(!q) return esc(text);
  const i=text.toLowerCase().indexOf(q); if(i<0) return esc(text);
  return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length));
}

function jumpToday(instant){

  const tm=g.querySelector('.today-mark'); if(!tm) return; const tx=parseFloat(tm.style.left)||0;
  const leftW=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--left-w'))||328;
  const target=tx-(g.clientWidth-leftW)/2;   // center today in the visible track
  g.scrollTo({left:Math.max(0,target), behavior:instant?'auto':'smooth'});
}

document.getElementById('importFile').onchange=e=>{
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{
    const d=JSON.parse(r.result);
    let incoming = Array.isArray(d.tribes)?d.tribes : (Array.isArray(d.squads)?[{name:d.name||'Imported',squads:d.squads}] : (d.name&&Array.isArray(d.squads)?[d]:null));
    if(!incoming||!incoming.length){alert('Not a valid tribe export.');return;}
    if(!Array.isArray(state.tribes)) state.tribes=[];
    let firstNew=null;
    incoming.forEach(tr=>{
      const idx = tr.id ? state.tribes.findIndex(t=>t.id===tr.id) : -1;
      if(idx>=0){ const old=state.tribes[idx]; state.tribes[idx]=Object.assign({},tr,{hidden:old.hidden||[]}); firstNew=tr.id; }   // replace same-id tribe in place (keep its hidden)
      else { const tid=tr.id||('tribe_'+uid()); state.tribes.push(Object.assign({},tr,{id:tid})); if(!firstNew)firstNew=tid; }
    });
    state=migrate(state);
    if(firstNew) state.activeTribe=firstNew;
    const sqs=curSquads(); if(sqs[0]) state.activeSquad=sqs[0].id;
    render();
  }catch(err){alert('Invalid file');}};
  r.readAsText(f);
};

/* ============================ Auth flow ============================ */
function decodeJwt(token){
  const part=token.split('.')[1];
  const json=decodeURIComponent(atob(part.replace(/-/g,'+').replace(/_/g,'/'))
    .split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
  return JSON.parse(json);
}
function loadAuth(){
  try{const a=JSON.parse(localStorage.getItem(AUTH_KEY));
    if(a&&a.email&&a.exp&&a.exp>Date.now()&&a.idToken&&a.email.toLowerCase().endsWith('@'+ALLOWED_DOMAIN))return a;}catch(e){}
  return null;
}
function authError(msg){const e=document.getElementById('gerr');e.textContent=msg;e.style.display='block';}
function showGate(){
  document.getElementById('loginGate').style.display='flex';
  document.getElementById('acct').style.display='none';
  initGoogle();
}
function showApp(auth){
  idToken = auth.idToken;
  currentEmail = (auth.email||'').toLowerCase();
  document.getElementById('loginGate').style.display='none';
  document.getElementById('acct').style.display='flex';
  renderProfile(auth);
  syncLoad().then(startPolling);   // pull the shared copy, then watch for teammates' changes
}
function renderProfile(auth){
  const name=auth.name||auth.email||'', initial=(name.trim()[0]||'?');
  const av=document.getElementById('profileAvatar'), lg=document.getElementById('pmAvatar');
  [av,lg].forEach(el=>{
    if(auth.picture){ el.style.backgroundImage='url("'+auth.picture+'")'; el.textContent=''; }
    else { el.style.backgroundImage=''; el.textContent=initial; }
  });
  document.getElementById('pmName').textContent=auth.name||'';
  document.getElementById('pmEmail').textContent=auth.email||'';
}
function onCredential(resp){
  let p; try{p=decodeJwt(resp.credential);}catch(e){authError('Sign-in failed. Please try again.');return;}
  const email=(p.email||'').toLowerCase();
  if(!p.email_verified || !email.endsWith('@'+ALLOWED_DOMAIN)){
    if(window.google) google.accounts.id.disableAutoSelect();
    authError('Access is restricted to @'+ALLOWED_DOMAIN+' accounts.');
    return;
  }
  const auth={email:p.email,name:p.name||'',picture:p.picture||'',exp:(p.exp||0)*1000,idToken:resp.credential};
  localStorage.setItem(AUTH_KEY,JSON.stringify(auth));
  showApp(auth);
}
function initGoogle(){
  if(GOOGLE_CLIENT_ID.startsWith('YOUR_')){document.getElementById('gsetup').style.display='block';return;}
  if(!window.google||!google.accounts||!google.accounts.id){setTimeout(initGoogle,200);return;}
  google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:onCredential,hd:ALLOWED_DOMAIN,auto_select:true});
  google.accounts.id.renderButton(document.getElementById('gbtn'),{theme:'outline',size:'large',width:280,text:'signin_with',shape:'pill'});
  google.accounts.id.prompt();
}
document.getElementById('signOut').onclick=()=>{
  if(!confirm('Log out of the Roadmap dashboard?')) return;
  stopPolling();
  idToken=null; lastSyncedJSON=null; baselineUpdatedAt=0;
  localStorage.removeItem(AUTH_KEY);
  if(window.google&&google.accounts) google.accounts.id.disableAutoSelect();
  document.getElementById('profileMenu').style.display='none';
  showGate();
};
// profile dropdown open/close
(function(){
  const btn=document.getElementById('profileBtn'), menu=document.getElementById('profileMenu');
  btn.onclick=e=>{ e.stopPropagation(); menu.style.display = menu.style.display==='none' ? 'block' : 'none'; };
  document.addEventListener('click',e=>{ if(!e.target.closest('.profile-wrap')) menu.style.display='none'; });
})();

(function bootstrap(){
  try{ const q=new URL(location.href).searchParams; pendingViewSlug=q.get('view'); pendingTribeSlug=q.get('tribe'); }catch(e){}
  const saved=loadAuth();
  if(saved) showApp(saved); else showGate();
})();
</script>
</body>
</html>
